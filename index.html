<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Melomaniac Studios — A house for sound</title>
  <meta name="description" content="Melomaniac Studios — a house for sound.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Preload the local three.js module so the fetch overlaps HTML parsing.
       With cache disabled + throttled network this is the difference between
       "reveal within ~200 ms" and "reveal after ~1 s". -->
  <link rel="modulepreload" href="./vendor/three.module.min.js">
  <!--
    Fraunces loaded as a full variable font: ital, opsz, wght, SOFT, WONK.
    The house cut (SOFT 40, WONK 0) is applied everywhere Fraunces appears
    via var(--house-serif-mods). See DESIGN.md § "The house cut".
  -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #B8F06E;
      --green-ink: #24350D;
      --paper: #F5F3EC;
      --paper-deep: #ECE9DF;
      --ink: #141310;
      --ink-soft: rgba(20,19,16,.55);
      --ink-mute: rgba(20,19,16,.34);
      --hairline: rgba(20,19,16,.14);
      /* The house cut — proprietary Fraunces instance. See DESIGN.md. */
      --house-serif: 'Fraunces', 'Instrument Serif', Georgia, serif;
      --house-serif-mods: 'SOFT' 40, 'WONK' 0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; background: var(--paper); }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: var(--green); color: var(--ink); }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { text-wrap: balance; }

    /* ── LOADING COVER ─────────────────────────────────────────────
       Ivory overlay above everything, present from HTML parse. It hides
       the whole page until either the WebGL piece has its first frame
       in the backbuffer (body.hero-live) or we've decided to fall back
       to the static poster (body.hero-poster). No opacity transition —
       the user never sees a composition swap, only a hard reveal of
       the finished piece.

       Position: fixed, z-index above everything. Covers the visible
       area including any letterboxed SVG whitespace. Because html+body
       are both painted --paper, the "blank ivory moment" is truly
       blank ivory — no fonts loading in / no partial layout visible. */
    #loading-cover {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 999;
      pointer-events: none;
    }
    body.hero-live #loading-cover,
    body.hero-poster #loading-cover { display: none; }

    /* Canvas vs poster visibility.
       Default: canvas is the display (used by hero-live).
       Poster is only shown when we've decided to fall back —
       never as a loading state. */
    .hero-svg { opacity: 0; pointer-events: none; }
    #hero-canvas { opacity: 1; }
    body.hero-poster .hero-svg { opacity: 1; }
    body.hero-poster #hero-canvas { display: none; }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background: var(--paper);
    }
    .hero-stage {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .hero-svg, #hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      min-height: 100svh;
      padding: 2.4rem clamp(1.5rem, 4vw, 3.5rem) 1.8rem;
      pointer-events: none;
    }
    .hero-content > * { pointer-events: auto; }

    .hero-content::before {
      content: '';
      position: absolute;
      left: -6%;
      top: 18%;
      width: 78%;
      height: 62%;
      background: radial-gradient(ellipse at 32% 50%, rgba(245,243,236,.62) 0%, rgba(245,243,236,0) 62%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .85rem;
      font-size: .68rem; letter-spacing: .34em; text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      align-self: start; justify-self: start;
    }
    .hero-eyebrow::before {
      content: ''; width: 30px; height: 1px; background: var(--ink);
    }

    .hero-main {
      align-self: center;
      max-width: min(60ch, 100%);
      display: flex; flex-direction: column;
      gap: 1.4rem;
    }
    .hero-wordmark {
      color: var(--ink);
      display: block;
      width: clamp(280px, 62vw, 780px);
      margin: 0;
      line-height: 0;
    }
    .hero-wordmark .wordmark-svg {
      display: block;
      width: 100%;
      height: auto;
      color: currentColor;
    }
    .wordmark-fallback {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    .hero-tagline {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 24, 'wght' 300, var(--house-serif-mods);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 1.55vw, 1.5rem);
      line-height: 1.35;
      color: var(--ink-soft);
      max-width: 30ch;
    }

    .hero-scroll {
      justify-self: center;
      display: inline-flex; flex-direction: column; align-items: center; gap: .55rem;
      font-size: .55rem; letter-spacing: .38em; text-transform: uppercase;
      color: var(--ink-mute); font-weight: 500;
    }
    .hero-scroll .line {
      display: block;
      width: 1px; height: 22px;
      background: var(--ink-mute);
      transform-origin: top center;
      animation: scrollpulse 3.5s ease-in-out infinite;
    }
    @keyframes scrollpulse {
      0%, 100% { transform: scaleY(.5); opacity: .5; }
      50%      { transform: scaleY(1);  opacity: 1; }
    }

    @media (max-width: 720px) {
      .hero-content { padding: 2rem 1.5rem 1.4rem; }
      .hero-content::before { display: none; }
    }

    /* ═══════════════════════════════════════════════════════════════════
       SECTION FRAMEWORK — shared across the House index, Labs featured,
       and (later) the pillar pages, Early Access, footer.
       ═══════════════════════════════════════════════════════════════════ */
    .section {
      position: relative;
      padding: clamp(5rem, 10vw, 10rem) clamp(1.5rem, 4vw, 3.5rem);
    }
    .section-inner {
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-eyebrow {
      display: inline-flex; align-items: center; gap: .85rem;
      font-size: .68rem; letter-spacing: .34em; text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      margin-bottom: clamp(3rem, 6vw, 6rem);
    }
    .section-eyebrow::before {
      content: ''; width: 30px; height: 1px; background: var(--ink);
    }

    /* ═══════════════════════════════════════════════════════════════════
       THE HOUSE — the four pillars as equals.
       Editorial index: oversized serif numerals + names, one-line
       descriptions, hairline separators. Feels like a maison's list of
       métiers. Data-driven — a fifth pillar means one more object.
       ═══════════════════════════════════════════════════════════════════ */
    .house { background: var(--paper); }

    .pillars { list-style: none; }
    .pillar {
      border-top: 1px solid var(--hairline);
    }
    .pillar:last-child { border-bottom: 1px solid var(--hairline); }

    .pillar-link {
      display: grid;
      grid-template-columns: minmax(3.5ch, auto) 1fr auto;
      gap: 0 clamp(1.5rem, 4vw, 4rem);
      align-items: center;
      padding: clamp(3rem, 5vw, 5rem) 0;
      color: var(--ink);
    }
    .pillar-num {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 144, 'wght' 300, var(--house-serif-mods);
      font-weight: 300;
      font-size: clamp(4.5rem, 9vw, 10rem);
      line-height: .82;
      letter-spacing: -.02em;
      color: var(--ink);
      font-feature-settings: 'lnum';
    }
    .pillar-body {
      display: flex;
      flex-direction: column;
      gap: clamp(.6rem, 1vw, 1rem);
      min-width: 0;
    }
    .pillar-name {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 144, 'wght' 300, var(--house-serif-mods);
      font-weight: 300;
      font-size: clamp(2.4rem, 5.5vw, 6rem);
      line-height: .92;
      letter-spacing: -.02em;
      color: var(--ink);
      text-wrap: balance;
    }
    .pillar-line {
      font-family: 'Inter', sans-serif;
      font-size: clamp(.9rem, 1.1vw, 1.05rem);
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 46ch;
      text-wrap: balance;
    }
    .pillar-arrow {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 144, 'wght' 300, var(--house-serif-mods);
      font-size: clamp(1.4rem, 2vw, 1.9rem);
      color: var(--ink-mute);
      line-height: 1;
      align-self: center;
      padding-left: 1rem;
      transition: transform .5s ease, color .5s ease;
    }
    .pillar-link:hover .pillar-arrow,
    .pillar-link:focus-visible .pillar-arrow {
      transform: translateX(10px);
      color: var(--ink);
    }
    .pillar-link:focus-visible {
      outline: 1px solid var(--ink);
      outline-offset: 6px;
    }

    @media (max-width: 720px) {
      .pillar-link {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: .5rem 1rem;
      }
      .pillar-num {
        grid-column: 1 / -1;
        font-size: clamp(3.6rem, 15vw, 5.5rem);
      }
      .pillar-body { grid-column: 1; grid-row: 2; }
      .pillar-arrow { grid-column: 2; grid-row: 2; padding-left: 0; }
    }

    /* ═══════════════════════════════════════════════════════════════════
       LABS FEATURED — the newest wing of the house.
       Full chartreuse band. Ink-on-green: the signature high-contrast
       pairing. This is the ONE loud accent moment on the page; everything
       around it stays quiet paper.
       ═══════════════════════════════════════════════════════════════════ */
    .labs {
      background: var(--green);
      color: var(--ink);
    }
    .labs .section-eyebrow { color: var(--ink); }
    .labs .section-eyebrow::before { background: var(--ink); }

    .labs-lead {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 144, 'wght' 300, var(--house-serif-mods);
      font-weight: 300;
      font-size: clamp(2.4rem, 6vw, 6rem);
      line-height: .9;
      letter-spacing: -.03em;
      color: var(--ink);
      max-width: 22ch;
      text-wrap: balance;
      margin-bottom: clamp(3rem, 6vw, 6rem);
    }

    /* Labs index (left) + preview (right). NO NUMBERS. */
    .labs-grid {
      display: grid;
      grid-template-columns: minmax(280px, 44%) 1fr;
      gap: clamp(2rem, 5vw, 5rem);
      align-items: stretch;
    }
    .labs-index {
      list-style: none;
      display: flex; flex-direction: column;
      margin: 0; padding: 0;
    }
    .labs-index-row {
      border-top: 1px solid rgba(20,19,16,.30);
    }
    .labs-index-row:last-child {
      border-bottom: 1px solid rgba(20,19,16,.30);
    }
    .labs-name-link {
      display: flex; flex-direction: column;
      gap: .55rem;
      padding: clamp(1.6rem, 3vw, 2.5rem) 0 clamp(1.6rem, 3vw, 2.5rem) 0;
      color: var(--ink);
      position: relative;
      transition: padding-left .55s ease;
    }
    .labs-name-link::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--ink);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform .55s ease;
    }
    .labs-index-row.is-active .labs-name-link,
    .labs-name-link:hover,
    .labs-name-link:focus-visible {
      padding-left: 1.1rem;
    }
    .labs-index-row.is-active .labs-name-link::before,
    .labs-name-link:hover::before,
    .labs-name-link:focus-visible::before {
      transform: scaleY(1);
    }
    .labs-name {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 144, 'wght' 300, var(--house-serif-mods);
      font-weight: 300;
      font-size: clamp(2.4rem, 5vw, 5rem);
      line-height: .95;
      letter-spacing: -.02em;
      color: var(--ink);
    }
    .labs-line {
      font-family: 'Inter', sans-serif;
      font-size: clamp(.85rem, 1vw, 1rem);
      line-height: 1.5;
      color: rgba(20,19,16,.72);
      text-wrap: balance;
      max-width: 38ch;
    }
    .labs-cta-mini {
      font-size: .60rem; letter-spacing: .3em; text-transform: uppercase;
      font-weight: 500; color: var(--ink);
      display: inline-flex; align-items: center; gap: .35rem;
      margin-top: .35rem;
      opacity: .55;
      transition: opacity .55s ease;
    }
    .labs-index-row.is-active .labs-cta-mini,
    .labs-name-link:hover .labs-cta-mini,
    .labs-name-link:focus-visible .labs-cta-mini { opacity: 1; }
    .labs-cta-arrow {
      font-family: var(--house-serif);
      font-variation-settings: 'opsz' 24, 'wght' 300, var(--house-serif-mods);
      text-transform: none; letter-spacing: 0;
      font-size: 1.2em;
      margin-left: .25rem;
    }
    .labs-name-link:focus-visible {
      outline: 1px solid var(--ink);
      outline-offset: 6px;
    }

    /* Preview panel: canvas showing the current preset's live loop. */
    .labs-preview {
      position: relative;
      border-top: 1px solid rgba(20,19,16,.30);
      border-bottom: 1px solid rgba(20,19,16,.30);
      align-self: stretch;
      overflow: hidden;
      background: transparent;
      min-height: 26rem;
    }
    #labs-canvas {
      display: block;
      width: 100%; height: 100%;
      transition: opacity .28s ease;
    }
    .labs-preview.is-switching #labs-canvas { opacity: .18; }
    .labs-preview-label {
      position: absolute;
      top: clamp(1rem, 2vw, 1.5rem);
      left: clamp(1rem, 2vw, 1.5rem);
      font-size: .58rem; letter-spacing: .34em; text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      opacity: .55;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .labs-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .labs-preview {
        order: 2;
        min-height: 20rem;
      }
    }

    /* Reduced motion → static SVG poster is the display, canvas never lights up. */
    @media (prefers-reduced-motion: reduce) {
      .hero-scroll .line { animation: none; opacity: .6; }
      html { scroll-behavior: auto; }
      #hero-canvas { display: none; }
      .hero-svg { opacity: 1; }
      .pillar-link:hover .pillar-arrow,
      .lab-link:hover .lab-arrow { transform: none; }
    }
  </style>
</head>
<body>
  <!-- Loading cover: hides everything until first paint is the finished piece. -->
  <div id="loading-cover"></div>

  <main>
    <section class="hero">
      <div class="hero-stage">
        <svg class="hero-svg" id="hero-svg" viewBox="-3.4 -3.4 6.8 6.8" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <canvas id="hero-canvas" aria-hidden="true"></canvas>
      </div>
      <div class="hero-content">
        <div class="hero-eyebrow"><span>Melomaniac Studios</span></div>
        <div class="hero-main">
          <h1 class="hero-wordmark">
            <!-- Accessible fallback text. -->
            <span class="wordmark-fallback">Melomaniac Studios</span>
            <!--
              Bespoke wordmark SVG.
              — Two lines set in the house cut Fraunces (opsz 144, wght 300, SOFT 40, WONK 0).
              — One hand-drawn signature: a hairline "brand rule" below the wordmark
                gesturing right, then hooking down toward Studios. This is the honest
                first-pass bespoke element. A fully flattened-to-paths version with
                hand-modified letterforms is a follow-up pass (needs a font tool).
            -->
            <svg class="wordmark-svg" viewBox="0 0 720 268" role="img" aria-hidden="true" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
              <g fill="currentColor" style="font-family: 'Fraunces', 'Instrument Serif', Georgia, serif; font-variation-settings: 'opsz' 144, 'wght' 300, 'SOFT' 40, 'WONK' 0;">
                <text x="0"  y="146" font-size="176" letter-spacing="-4">Melomaniac</text>
                <text x="10" y="246" font-size="120" font-style="italic" letter-spacing="-3">Studios</text>
              </g>
              <!-- Bespoke signature hairline. Sits between the two words, gestures right and
                   hooks into the italic Studios — the one custom stroke that makes this a logotype. -->
              <path d="M 0 170 L 630 170 L 630 200"
                    stroke="currentColor" stroke-width="3" fill="none"
                    stroke-linecap="butt" stroke-linejoin="miter" opacity="0.75"/>
            </svg>
          </h1>
          <p class="hero-tagline">A house for sound.</p>
        </div>
        <div class="hero-scroll">
          <span>Scroll</span>
          <span class="line" aria-hidden="true"></span>
        </div>
      </div>
    </section>

    <!-- ═══ THE HOUSE ═══ Data-driven; see the builder script below. ═══ -->
    <section class="section house" id="house" aria-labelledby="house-eyebrow">
      <div class="section-inner">
        <div class="section-eyebrow" id="house-eyebrow"><span>The House</span></div>
        <ol class="pillars" role="list"></ol>
      </div>
    </section>

    <!--
      ═══ LABS FEATURED ═══
      Names index (left) + live preview panel (right). No numbers.
      Ink-on-green: the signature high-contrast pairing.
      Preview panel runs the SAME wave-field engine as the hero, with a
      preset per product. Hover/focus a name switches the preview.
    -->
    <section class="section labs" id="labs" aria-labelledby="labs-eyebrow">
      <div class="section-inner">
        <div class="section-eyebrow" id="labs-eyebrow"><span>Labs</span></div>
        <h2 class="labs-lead">The newest wing of the house.</h2>
        <div class="labs-grid">
          <ol class="labs-index" role="list" id="labs-index"></ol>
          <div class="labs-preview" id="labs-preview">
            <canvas id="labs-canvas" aria-hidden="true"></canvas>
            <div class="labs-preview-label" id="labs-preview-label">Manifold</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!--
    House index + Labs featured — data-driven build.
    Pillars and experiments are pure JS objects; render templates below turn
    them into markup. Adding a fifth pillar = one more object in PILLARS.
    Runs before the WebGL module so the DOM is complete before scripts that
    scroll or route by hash.
  -->
  <script>
  (function buildHouseAndLabs(){
    const PILLARS = [
      { num: '01', name: 'Record Label', line: 'Independent. Artist-first.',                                   href: '#record-label' },
      { num: '02', name: 'Sound Design', line: 'Sonic identity for brands and spaces, zero to one hundred.',  href: '#sound-design' },
      { num: '03', name: 'Melomania',    line: 'Original music, composed per night. Invite only.',            href: '#melomania' },
      { num: '04', name: 'Labs',         line: 'The experimental wing.',                                       href: '#labs' },
    ];

    // NO NUMBERS. Data-driven — one entry per product; the module script
    // wires each name to its enginePreset so the preview loop switches
    // to that product's parameter set on hover/focus/cycle.
    const LABS = [
      { name: 'Manifold',  line: 'Your music, made visible.',       cta: 'Launch',     href: '#manifold',                              enginePreset: 'manifold'  },
      { name: 'Frequency', line: 'Find yours in four questions.',   cta: 'Find yours', href: '#frequency',                             enginePreset: 'frequency' },
      { name: 'Noted',     line: 'Talk to your mix.',               cta: 'Launch',     href: 'https://noted.melomaniacstudios.com',    enginePreset: 'noted'     },
    ];
    // Expose to the module script so hover/cycle wiring and preview engine
    // can read the same source of truth.
    window.__LABS = LABS;

    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));

    const pillarsEl = document.querySelector('.pillars');
    if (pillarsEl) {
      pillarsEl.innerHTML = PILLARS.map((p) => `
        <li class="pillar">
          <a class="pillar-link" href="${escapeHtml(p.href)}">
            <span class="pillar-num" aria-hidden="true">${escapeHtml(p.num)}</span>
            <div class="pillar-body">
              <div class="pillar-name">${escapeHtml(p.name)}</div>
              <div class="pillar-line">${escapeHtml(p.line)}</div>
            </div>
            <span class="pillar-arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
      `).join('');
    }

    const labsIndexEl = document.getElementById('labs-index');
    if (labsIndexEl) {
      labsIndexEl.innerHTML = LABS.map((l, i) => {
        const isExternal = /^https?:\/\//.test(l.href);
        const extAttrs = isExternal ? ' target="_blank" rel="noopener"' : '';
        return `
          <li class="labs-index-row" data-lab-idx="${i}">
            <a class="labs-name-link" href="${escapeHtml(l.href)}"${extAttrs}
               data-preset="${escapeHtml(l.enginePreset)}"
               data-name="${escapeHtml(l.name)}">
              <div class="labs-name">${escapeHtml(l.name)}</div>
              <div class="labs-line">${escapeHtml(l.line)}</div>
              <div class="labs-cta-mini">${escapeHtml(l.cta)}<span class="labs-cta-arrow" aria-hidden="true">&rarr;</span></div>
            </a>
          </li>
        `;
      }).join('');
    }
  })();
  </script>

  <!--
    SVG poster.
    ONLY shown as (a) no-WebGL / import-failure fallback, (b) reduced-motion.
    Never as a loading state.
    Snapshot: emitters just fired (beat 0), rings frozen partway through
    their first propagation — reads as a still frame from the piece.
  -->
  <script>
  (function buildStaticPoster(){
    const svg = document.getElementById('hero-svg');
    if (!svg) return;

    const now = new Date();
    const seed = (
      (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
      + now.getHours() * 60 + now.getMinutes()
    ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
    let s = seed >>> 0;
    const rng = () => {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const rand = (a, b) => a + rng() * (b - a);

    const INK       = 'rgba(20,19,16,.55)';
    const INK_FAINT = 'rgba(20,19,16,.20)';
    const GREEN     = '#B8F06E';

    // Same emitter seeding order as the WebGL initHero — poster shows a
    // snapshot with beat rings already in mid-propagation.
    const emitters = [];
    for (let i = 0; i < 3; i++) {
      emitters.push({
        x: rand(-1.8, 1.8),
        y: rand(-1.2, 1.2),
        z: rand(-0.6, 0.6),   // consumed to keep the seed stream aligned
        omega: rand(1.6, 3.0),
        amp:   rand(0.75, 1.15),
        phase: rand(0, Math.PI * 2),
      });
    }

    // Static snapshot at t = SNAP_T with the SAME causal 4-beat wave model
    // as the WebGL side. Beats fire at 0, p, 2p, 3p, 4p (idx=4 = downbeat);
    // T_SNAP is 0.15 s after beat 4, matching CLOCK_PREADVANCE. So poster
    // and first live frame agree.
    const BP     = 60 / 110;
    const SP     = 0.80;
    const SNAP_T = BP * 4 + 0.15;
    const C      = 2.0;
    function scalarField(x, y) {
      let f = 0;
      for (const e of emitters) {
        const dx = x - e.x, dy = y - e.y;
        const r  = Math.hypot(dx, dy);
        const k  = e.omega * 0.5;
        // 4 tracked beats: indices 4, 3, 2, 1 (most-recent first).
        for (let m = 0; m < 4; m++) {
          const bi   = 4 - m;                 // beat index 4, 3, 2, 1
          const bt   = bi * BP;
          const bAmp = (bi % 4 === 0) ? 1.35 : 0.85;
          const tau  = (SNAP_T - bt) * SP;
          if (tau <= 0) continue;
          const tauLocal = tau - r / C;
          if (tauLocal < 0) continue;
          const attack    = 1 - Math.exp(-tauLocal / 0.03);
          const localDec  = Math.exp(-tauLocal / 0.20);
          const globalDec = Math.exp(-tau      / 0.35);
          const env       = attack * localDec * globalDec;
          const ph        = k * r - e.omega * tau + e.phase;
          f += e.amp * bAmp * env * Math.cos(ph) / (1 + r * 0.15);
        }
      }
      return f;
    }

    // Green particle scatter — the primary visual.
    // Same existence/excitation model as the WebGL piece:
    //   baseAlpha (0.35–0.55) is the resting alpha — every particle is drawn.
    //   The field-snapshot value only BOOSTS alpha and radius on top.
    const scatter = [];
    const N = 1200;
    for (let i = 0; i < N; i++) {
      let x, y;
      do { x = rand(-3.05, 3.05); y = rand(-3.05, 3.05); }
      while (x*x + y*y > 8.7);
      const baseAlpha = rand(0.35, 0.55);
      const baseR     = rand(0.011, 0.020);
      const isInk     = rng() < 0.08;
      const f       = scalarField(x, y);
      const mag     = Math.min(Math.abs(f), 1.5);
      const excited = Math.max(0, Math.min(1, (mag - 0.05) / 0.55));
      const alpha   = Math.min(1.0, baseAlpha * (1.0 + excited * 1.4));
      const r       = baseR * (1.0 + excited * 0.55);
      const color   = isInk ? INK : GREEN;
      scatter.push(
        `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r.toFixed(3)}" fill="${color}" fill-opacity="${alpha.toFixed(2)}"/>`
      );
    }

    svg.innerHTML = [
      `<g>${scatter.join('')}</g>`,
      `<circle cx="0" cy="0" r="2.85" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="2.05" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="1.35" fill="none" stroke="${INK_FAINT}" stroke-width=".009"/>`,
    ].join('');
  })();
  </script>

  <!--
    WebGL piece. 110 BPM beat clock; every element samples the same
    shared wave field. Mouse behavior preserved from the previous pass.

    Reveal contract:
      • Loading cover hides everything from HTML parse.
      • Module imports three.js (preloaded).
      • initHero: pre-renders the FIRST FRAME at a pre-advanced clock
        (so multiple beats already in flight → composition is alive),
        THEN removes the loading cover in the same task.
      • Fallback: if module/WebGL fail, or a 3.0 s timeout elapses,
        the poster is revealed instead. Never a composition swap.
  -->
  <script type="module">
    const REVEAL_TIMEOUT_MS = 3000;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.body.classList.add('hero-poster');
    } else {
      const fallbackTimer = setTimeout(() => {
        console.warn('[hero] Init timed out — poster fallback.');
        document.body.classList.add('hero-poster');
      }, REVEAL_TIMEOUT_MS);
      try {
        const THREE = await import('./vendor/three.module.min.js');
        initHero(THREE, () => {
          clearTimeout(fallbackTimer);
          document.body.classList.add('hero-live');
        });
        // Kick off the Labs preview engine once THREE is loaded. Isolated
        // from hero (own renderer, own scene, own beat clock, duplicated
        // shader source) so a failure here can't affect the hero.
        try { initLabs(THREE); } catch (e) { console.warn('[labs] init failed.', e); }
      } catch (err) {
        clearTimeout(fallbackTimer);
        console.warn('[hero] Module unavailable — poster fallback.', err);
        document.body.classList.add('hero-poster');
      }
    }

    function initHero(THREE, onFirstFrameReady) {
      const canvas = document.getElementById('hero-canvas');
      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      } catch (e) {
        console.warn('[hero] WebGL unavailable — poster fallback.', e);
        document.body.classList.add('hero-poster');
        return;
      }

      const INK   = 0x141310;
      const GREEN = 0xB8F06E;
      const PAPER = 0xF5F3EC;

      // ── The two knobs ────────────────────────────────────────────────
      // BPM is LOCKED at 110 (the piece is on a sound system).
      // SPEED scales the wave physics — how long each beat's ring takes
      // to travel/decay — without changing when beats fire.
      const BPM = 110;
      const BEAT_PERIOD = 60 / BPM;   // 0.5454545 s
      const SPEED = 0.80;

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setClearColor(PAPER, 1);
      const pixelRatio = renderer.getPixelRatio();

      // ── Seeded RNG (mulberry32) ─────────────────────────────────────
      const now = new Date();
      const seed = (
        (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
        + now.getHours() * 60 + now.getMinutes()
      ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
      let s = seed >>> 0;
      const rng = () => {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
      const rand = (a, b) => a + rng() * (b - a);

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.z = 8;

      const assembly = new THREE.Group();
      scene.add(assembly);

      // ── Emitters (seeded, stationary) ────────────────────────────────
      const emitters = [];
      for (let i = 0; i < 3; i++) {
        emitters.push({
          pos:   new THREE.Vector3(rand(-1.8, 1.8), rand(-1.2, 1.2), rand(-0.6, 0.6)),
          omega: rand(1.6, 3.0),
          amp:   rand(0.75, 1.15),
          phase: rand(0, Math.PI * 2),
        });
      }

      // Chladni background pattern — quiet standing wave that rises/recedes
      // over minutes so nodal grids emerge and dissolve underneath the beats.
      const chladniKx = rand(1.4, 2.8);
      const chladniKy = rand(1.4, 2.8);

      // Mouse-as-emitter (kept exactly as in the previous pass).
      const mouseLocal = new THREE.Vector3(999, 999, 999);
      let mouseAmp = 0.0;
      const mouseFreq = rand(2.2, 3.4);

      // ── Fluid particles ──────────────────────────────────────────────
      function chooseCount(w) {
        if (w >= 1400) return 7000;
        if (w >= 1000) return 5000;
        if (w >= 640)  return 3000;
        return 1800;
      }
      const N = chooseCount(window.innerWidth);

      const pos    = new Float32Array(N * 3);
      const col    = new Float32Array(N * 3);
      const sizeA  = new Float32Array(N);
      const alphaA = new Float32Array(N);
      const gr = new THREE.Color(GREEN);
      const inkC = new THREE.Color(INK);

      for (let i = 0; i < N; i++) {
        const r  = Math.sqrt(rng()) * 3.05;
        const th = rng() * Math.PI * 2;
        pos[i*3]   = Math.cos(th) * r;
        pos[i*3+1] = Math.sin(th) * r;
        pos[i*3+2] = (rng() - 0.5) * 0.9;
        sizeA[i]  = rand(0.55, 1.1);
        // aAlpha IS the resting alpha. Range 0.35–0.55 → the cloud is fully
        // present on a still field; excitation only boosts upward from here.
        alphaA[i] = rand(0.35, 0.55);
        const isInk = rng() < 0.08;
        const c = isInk ? inkC : gr;
        col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
      }

      const fluidGeom = new THREE.BufferGeometry();
      fluidGeom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      fluidGeom.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
      fluidGeom.setAttribute('aSize',    new THREE.BufferAttribute(sizeA, 1));
      fluidGeom.setAttribute('aAlpha',   new THREE.BufferAttribute(alphaA, 1));

      // ── Vertex shader: BEAT-DRIVEN WAVE FIELD ────────────────────────
      // Each beat, every emitter fires a WAVEPACKET — a Gaussian-enveloped
      // ring propagating at c = 2 and decaying with tau_env ≈ 0.32 s. We
      // track the 3 most recent beat times so up to 3 concentric rings from
      // each emitter are in flight simultaneously. Between beats, energy
      // decays → the field visibly settles toward rest. Downbeats (every 4th
      // beat) fire louder. Mouse layered on top as a continuous emitter.
      const FLUID_VS = /* glsl */`
        precision highp float;
        uniform float uTime;             // effective time (real clock, pre-advanced on load)
        uniform float uSpeedScale;       // SPEED — scales physics tau
        uniform float uPixelRatio;
        uniform float uSizeBase;
        uniform float uKickBoost;        // 0 at rest, up to ~0.30 at beat peak

        uniform vec3  uE0Pos;  uniform vec3  uE1Pos;  uniform vec3  uE2Pos;
        uniform vec3  uEOmegas;
        uniform vec3  uEAmps;
        uniform vec3  uEPhases;

        // 4 most recent beat times & amplitudes (most recent → oldest).
        // Tracking 4 (not 3) is what makes recycling continuous: at slot reuse
        // the oldest beat has τ_eff = 4·p·SPEED ≈ 1.744 s → global envelope
        // exp(−1.744/0.35) ≈ 0.7 %, safely under the 1 % pop threshold.
        uniform vec4  uBeatTimes;
        uniform vec4  uBeatAmps;

        uniform vec3  uMousePos;
        uniform float uMouseAmp;
        uniform float uMouseFreq;

        uniform vec2  uChladniK;
        uniform float uChladniAmp;

        attribute vec3  aColor;
        attribute float aSize;
        attribute float aAlpha;

        varying vec3  vColor;
        varying float vAlpha;

        // Scalar contribution of one beat from one emitter — CAUSAL wave.
        //
        // The previous formulation was NOT causal: a Gaussian ring centered at
        // r = c·τ leaks amplitude ahead of the wavefront, so at τ = 0 a
        // particle at r > 0 already saw ~exp(−r²/0.5) · cos(k·r+φ) worth of
        // signal — that appeared instantaneously at each beat fire = pop.
        //
        // This form is causal: signal is exactly zero until the wavefront
        // arrives (τ_local = τ − r/c ≥ 0), then a smooth attack (~30 ms) rises
        // into a local exponential decay that shapes the ring behind the
        // wavefront, all multiplied by a global exponential that fades the
        // beat's total energy over its lifetime. Every factor is C∞ in t,
        // so every transition — beat fire, beat drop, sample motion — is
        // continuous by construction.
        //
        //   τ         = uSpeedScale · (t − beatTime)                (physics time)
        //   τ_local   = τ − r/c                                    (time since arrival)
        //   attack    = 1 − exp(−τ_local / 0.03)                   (~30 ms fast rise)
        //   localDec  = exp(−τ_local / 0.20)                        (ring shape behind front)
        //   globalDec = exp(−τ / 0.35)                              (beat lifetime)
        //   u         = amp · beatAmp · attack · localDec · globalDec
        //             · cos(k·r − ω·τ + φ) / (1 + α·r)
        //
        // Returns 0 if beatTime is the sentinel (< 0), if the beat hasn't
        // fired yet (τ ≤ 0), or if the wave hasn't reached this radius yet
        // (τ_local < 0). All three checks return the same value on either
        // side of their boundary, so u itself is continuous — see notes.
        float beatContrib(float r, float omega, float phase, float amp,
                          float beatTime, float beatAmp, float t) {
          if (beatTime < 0.0) return 0.0;
          float tau = (t - beatTime) * uSpeedScale;
          if (tau <= 0.0) return 0.0;
          float c = 2.0;
          float tauLocal = tau - r / c;
          if (tauLocal < 0.0) return 0.0;
          float attack     = 1.0 - exp(-tauLocal / 0.03);
          float localDec   = exp(-tauLocal / 0.20);
          float globalDec  = exp(-tau      / 0.35);
          float envelope   = attack * localDec * globalDec;
          float k  = omega * 0.5;
          float ph = k * r - omega * tau + phase;
          return amp * beatAmp * envelope * cos(ph) / (1.0 + r * 0.15);
        }

        // Continuous sinusoidal wave (used only by the mouse emitter — its
        // ripple-and-decay behavior is preserved verbatim from the last pass).
        float continuousContrib(float r, float omega, float amp, float t) {
          float k = omega * 0.75;
          float tS = t * uSpeedScale;
          return amp * sin(k * r - omega * tS) / (1.0 + r * 0.35);
        }

        void main() {
          vec3 basePos = position;

          // Emitter 0 — sum contributions from the 4 tracked beats.
          vec3  d0   = basePos - uE0Pos;
          float r0   = length(d0);
          vec3  dir0 = d0 / max(r0, 0.001);
          float uE0  = beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.x, uBeatAmps.x, uTime)
                     + beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.y, uBeatAmps.y, uTime)
                     + beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.z, uBeatAmps.z, uTime)
                     + beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.w, uBeatAmps.w, uTime);

          // Emitter 1
          vec3  d1   = basePos - uE1Pos;
          float r1   = length(d1);
          vec3  dir1 = d1 / max(r1, 0.001);
          float uE1  = beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.x, uBeatAmps.x, uTime)
                     + beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.y, uBeatAmps.y, uTime)
                     + beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.z, uBeatAmps.z, uTime)
                     + beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.w, uBeatAmps.w, uTime);

          // Emitter 2
          vec3  d2   = basePos - uE2Pos;
          float r2   = length(d2);
          vec3  dir2 = d2 / max(r2, 0.001);
          float uE2  = beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.x, uBeatAmps.x, uTime)
                     + beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.y, uBeatAmps.y, uTime)
                     + beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.z, uBeatAmps.z, uTime)
                     + beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.w, uBeatAmps.w, uTime);

          vec3  vecField    = dir0 * uE0 + dir1 * uE1 + dir2 * uE2;
          float scalarField = uE0 + uE1 + uE2;

          // Mouse: continuous sinusoidal source, same time reference as beats
          // so it INTERFERES with the beat field cleanly.
          if (uMouseAmp > 0.001) {
            vec3  dm   = basePos - uMousePos;
            float rm   = length(dm);
            vec3  dirm = dm / max(rm, 0.001);
            float um   = continuousContrib(rm, uMouseFreq, uMouseAmp, uTime);
            vecField    += dirm * um;
            scalarField += um;
          }

          // Chladni standing wave — quiet background nodal pattern.
          float chladni = uChladniAmp * sin(uChladniK.x * basePos.x) * sin(uChladniK.y * basePos.y);
          scalarField += chladni;
          vecField.z  += chladni * 0.35;

          // Displace along the vector field. Amplitude scaled so beats push
          // particles visibly on the hit and let them settle back between.
          vec3 displaced = basePos + vecField * 0.55;

          vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
          gl_Position = projectionMatrix * mvPosition;

          // EXISTENCE vs EXCITATION.
          //   Baseline = 1.0 for both size and alpha → every particle is ALWAYS
          //   rendered at aSize/aAlpha, arranged in the seeded composition.
          //   Excitation modulates ON TOP:
          //     • size boost up to +55 % at wavefront peaks
          //     • alpha boost up to +140 % at wavefront peaks (clamped to 1.0
          //       in the fragment output, so peaks max at full opacity)
          //   Kick envelope adds a transient global "hit" on every beat
          //   (larger on downbeats). No |field|-gating of visibility — the
          //   cloud is a fully-present piece; beats sweep energy through it.
          float mag     = min(abs(scalarField), 1.6);
          float excited = smoothstep(0.05, 0.60, mag);
          float alphaMul = (1.0 + excited * 1.4) * (1.0 + uKickBoost * 0.5);
          float sizeMul  = (1.0 + excited * 0.55) * (1.0 + uKickBoost * 0.35);

          gl_PointSize = uSizeBase * aSize * sizeMul * uPixelRatio * (22.0 / max(-mvPosition.z, 0.1));

          vColor = aColor;
          vAlpha = aAlpha * alphaMul;
        }
      `;

      const FLUID_FS = /* glsl */`
        precision mediump float;
        varying vec3  vColor;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d2 = dot(uv, uv);
          float a = smoothstep(0.24, 0.19, d2);
          if (a <= 0.001) discard;
          gl_FragColor = vec4(vColor, a * vAlpha);
        }
      `;

      const fluidMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime:        { value: 0 },
          uSpeedScale:  { value: SPEED },
          uPixelRatio:  { value: pixelRatio },
          uSizeBase:    { value: 1.0 },
          uKickBoost:   { value: 0 },
          uE0Pos:       { value: emitters[0].pos },
          uE1Pos:       { value: emitters[1].pos },
          uE2Pos:       { value: emitters[2].pos },
          uEOmegas:     { value: new THREE.Vector3(emitters[0].omega, emitters[1].omega, emitters[2].omega) },
          uEAmps:       { value: new THREE.Vector3(emitters[0].amp,   emitters[1].amp,   emitters[2].amp) },
          uEPhases:     { value: new THREE.Vector3(emitters[0].phase, emitters[1].phase, emitters[2].phase) },
          uBeatTimes:   { value: new THREE.Vector4(-1, -1, -1, -1) },
          uBeatAmps:    { value: new THREE.Vector4( 0,  0,  0,  0) },
          uMousePos:    { value: mouseLocal },
          uMouseAmp:    { value: 0 },
          uMouseFreq:   { value: mouseFreq },
          uChladniK:    { value: new THREE.Vector2(chladniKx, chladniKy) },
          uChladniAmp:  { value: 0 },
        },
        vertexShader: FLUID_VS,
        fragmentShader: FLUID_FS,
        transparent: true,
        depthWrite: false,
        depthTest:  true,
        blending:   THREE.NormalBlending,
      });

      const fluid = new THREE.Points(fluidGeom, fluidMat);
      assembly.add(fluid);

      // ── Architecture whisper: 3 hairline circles that sample the same field ──
      function makeCircle(radiusBase, colorHex, opacity, z, segments=128) {
        const positions = new Float32Array(segments * 3);
        for (let i = 0; i < segments; i++) {
          const t = (i / segments) * Math.PI * 2;
          positions[i*3]   = Math.cos(t) * radiusBase;
          positions[i*3+1] = Math.sin(t) * radiusBase;
          positions[i*3+2] = z;
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const line = new THREE.LineLoop(geom, new THREE.LineBasicMaterial({
          color: colorHex, transparent: true, opacity, depthWrite: false,
        }));
        line.userData = { basePositions: positions.slice() };
        return line;
      }

      const circles = [
        makeCircle(2.85, INK, 0.15, -0.12),
        makeCircle(2.05, INK, 0.17,  0.02),
        makeCircle(1.35, INK, 0.22,  0.14),
      ];
      circles.forEach(c => assembly.add(c));

      // JS mirror of one beat's scalar contribution — EXACT copy of the
      // shader's beatContrib (causal wave, attack + local + global decay).
      // Keep this in lockstep with the shader or circles will disagree with
      // particles.
      function beatContribJS(r, omega, phase, amp, beatTime, beatAmp, t) {
        if (beatTime < 0) return 0;
        const tau = (t - beatTime) * SPEED;
        if (tau <= 0) return 0;
        const c = 2.0;
        const tauLocal = tau - r / c;
        if (tauLocal < 0) return 0;
        const attack    = 1 - Math.exp(-tauLocal / 0.03);
        const localDec  = Math.exp(-tauLocal / 0.20);
        const globalDec = Math.exp(-tau      / 0.35);
        const envelope  = attack * localDec * globalDec;
        const k  = omega * 0.5;
        const ph = k * r - omega * tau + phase;
        return amp * beatAmp * envelope * Math.cos(ph) / (1 + r * 0.15);
      }
      // JS mirror of full scalar field. Loops over 4 tracked beats (to match
      // the shader). Used by circle deform.
      function scalarFieldJS(bx, by, bz, T, beatTimes, beatAmps) {
        let f = 0;
        for (let j = 0; j < 3; j++) {
          const e = emitters[j];
          const dx = bx - e.pos.x, dy = by - e.pos.y, dz = bz - e.pos.z;
          const r  = Math.sqrt(dx*dx + dy*dy + dz*dz);
          for (let b = 0; b < 4; b++) {
            f += beatContribJS(r, e.omega, e.phase, e.amp, beatTimes[b], beatAmps[b], T);
          }
        }
        if (mouseAmp > 0.001) {
          const dx = bx - mouseLocal.x, dy = by - mouseLocal.y, dz = bz - mouseLocal.z;
          const r  = Math.sqrt(dx*dx + dy*dy + dz*dz);
          const k  = mouseFreq * 0.75;
          const tS = T * SPEED;
          f += mouseAmp * Math.sin(k * r - mouseFreq * tS) / (1 + r * 0.35);
        }
        const chAmp = fluidMat.uniforms.uChladniAmp.value;
        f += chAmp * Math.sin(chladniKx * bx) * Math.sin(chladniKy * by);
        return f;
      }

      function deformCircles(T, beatTimes, beatAmps) {
        for (const c of circles) {
          const posAttr = c.geometry.attributes.position;
          const base = c.userData.basePositions;
          const M = posAttr.count;
          const arr = posAttr.array;
          for (let i = 0; i < M; i++) {
            const bx = base[i*3];
            const by = base[i*3+1];
            const bz = base[i*3+2];
            const f = scalarFieldJS(bx, by, bz, T, beatTimes, beatAmps);
            const dispR = f * 0.08;
            const n2 = bx*bx + by*by;
            if (n2 > 1e-4) {
              const inv = 1 / Math.sqrt(n2);
              arr[i*3]   = bx + bx * inv * dispR;
              arr[i*3+1] = by + by * inv * dispR;
            } else {
              arr[i*3]   = bx;
              arr[i*3+1] = by;
            }
            arr[i*3+2] = bz + f * 0.028;
          }
          posAttr.needsUpdate = true;
        }
      }

      // ── Camera / composition ─────────────────────────────────────────
      const baseTiltX = 0.28;
      assembly.rotation.x = baseTiltX;
      assembly.rotation.z = rng() * Math.PI * 2;

      function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h, false);
        const aspect = w / h;
        camera.aspect = aspect;
        camera.position.z = aspect >= 1.15 ? 8 : (aspect >= 0.85 ? 9.2 : (8 / Math.max(aspect, 0.42)));
        camera.updateProjectionMatrix();
        const isWide = aspect >= 1.4;
        const isMed  = aspect >= 0.95;
        assembly.position.x = isWide ? 1.2 : (isMed ? 0.5 : 0);
        assembly.scale.setScalar(isWide ? 1.0 : (isMed ? 0.9 : 0.82));
        fluidMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
      resize();
      window.addEventListener('resize', resize);

      // ── Mouse-as-emitter (unchanged behavior) ────────────────────────
      const raycaster = new THREE.Raycaster();
      const mouseNDC  = new THREE.Vector2();
      const _tmpWorld = new THREE.Vector3();
      const _plane    = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
      let pendingPointer = null;
      window.addEventListener('pointermove', (e) => {
        pendingPointer = { x: e.clientX, y: e.clientY };
      }, { passive: true });
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length) {
          pendingPointer = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }, { passive: true });
      function pumpPointer() {
        if (!pendingPointer) return;
        mouseNDC.x =  (pendingPointer.x / window.innerWidth)  * 2 - 1;
        mouseNDC.y = -(pendingPointer.y / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouseNDC, camera);
        if (raycaster.ray.intersectPlane(_plane, _tmpWorld)) {
          const clone = _tmpWorld.clone();
          assembly.worldToLocal(clone);
          mouseLocal.copy(clone);
          fluidMat.uniforms.uMousePos.value.copy(mouseLocal);
          mouseAmp = 1.0;
        }
        pendingPointer = null;
      }

      // ── Beat clock ───────────────────────────────────────────────────
      // 4 slots, most-recent → oldest. See the shader comment on uBeatTimes
      // for why 4: at slot reuse τ_eff = 4·p·SPEED ≈ 1.744 s, the wave/kick
      // envelope exp(−1.744/0.35) ≈ 0.7 % — safely under the 1 % pop threshold.
      const beatTimesArr = [-1, -1, -1, -1];
      const beatAmpsArr  = [ 0,  0,  0,  0];
      function updateBeatState(T) {
        const idx = Math.floor(T / BEAT_PERIOD);
        for (let k = 0; k < 4; k++) {
          const bi = idx - k;
          if (bi >= 0) {
            beatTimesArr[k] = bi * BEAT_PERIOD;
            beatAmpsArr[k]  = (bi % 4 === 0) ? 1.35 : 0.85;
          } else {
            // Sentinel: shader treats < 0 as "not fired yet" → contribution 0.
            beatTimesArr[k] = -1;
            beatAmpsArr[k]  = 0;
          }
        }
        fluidMat.uniforms.uBeatTimes.value.set(beatTimesArr[0], beatTimesArr[1], beatTimesArr[2], beatTimesArr[3]);
        fluidMat.uniforms.uBeatAmps.value.set(beatAmpsArr[0],   beatAmpsArr[1],   beatAmpsArr[2], beatAmpsArr[3]);

        // Kick envelope — SUMMED over all tracked beats for C∞ continuity.
        //   env(t) = Σ_k A_k · (1 − exp(−τ_k/0.03)) · exp(−τ_k/0.35)
        // Each new beat starts with attack = 0 (grows continuously), so the
        // sum has no step at beat boundaries. The old slot-2 (previous
        // single-beat) formulation reset to zero on each beat = the pop.
        // Peaks tuned so downbeats sit visibly above regular beats.
        let kick = 0;
        for (let k = 0; k < 4; k++) {
          const bt = beatTimesArr[k];
          if (bt < 0) continue;
          const tauK = (T - bt) * SPEED;
          if (tauK <= 0) continue;
          const attackK = 1 - Math.exp(-tauK / 0.03);
          const decayK  = Math.exp(-tauK / 0.35);
          const isDownK = beatAmpsArr[k] > 1.0;
          const peakK   = isDownK ? 0.55 : 0.30;
          kick += peakK * attackK * decayK;
        }
        fluidMat.uniforms.uKickBoost.value = kick;

        // Chladni amplitude — very slow rise/recede over minutes.
        fluidMat.uniforms.uChladniAmp.value = 0.10 * (0.5 + 0.5 * Math.sin(T * SPEED * 0.035));
      }

      // ── Pre-advance the clock so the FIRST FRAME shows the piece already ──
      // alive with all 4 beat slots filled. Land 0.15 s after the 4th beat
      // fires (idx=4 = downbeat), so at first paint we see a fresh downbeat
      // ring at r ≈ 0.24 plus 3 older rings mid-propagation. Without this,
      // the very first render happens with fewer active beats and the
      // composition is thinner than steady state.
      const CLOCK_PREADVANCE = BEAT_PERIOD * 4 + 0.15;   // ~2.33 s
      const clock = new THREE.Clock(false);
      function currentT() { return clock.getElapsedTime() + CLOCK_PREADVANCE; }

      function frame(T) {
        // Assembly drift stays extremely subtle — the beat is the primary motion.
        const driftY = Math.sin(T * SPEED * 0.075) * 0.18;
        const driftX = Math.sin(T * SPEED * 0.11)  * 0.045;
        assembly.rotation.y = driftY;
        assembly.rotation.x = baseTiltX + driftX;
        assembly.updateMatrixWorld(true);

        pumpPointer();
        mouseAmp *= 0.985;
        if (mouseAmp < 0.001) mouseAmp = 0;
        fluidMat.uniforms.uMouseAmp.value = mouseAmp;

        updateBeatState(T);
        fluidMat.uniforms.uTime.value = T;

        deformCircles(T, beatTimesArr, beatAmpsArr);

        renderer.render(scene, camera);
      }

      // ── First-paint contract ─────────────────────────────────────────
      // Render the first FULL frame at T = CLOCK_PREADVANCE (multiple beats
      // already in the field), then reveal — synchronously in the same task,
      // so the very first paint the user sees IS this frame.
      const T0 = CLOCK_PREADVANCE;
      frame(T0);
      onFirstFrameReady();

      // Now start the real clock and enter the rAF loop.
      clock.start();
      function tick() {
        frame(currentT());
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // ═══════════════════════════════════════════════════════════════════
    // LABS PREVIEW ENGINE
    //   Same wave-field engine as the hero — 3 stationary emitters, 4-beat
    //   causal wavepackets, kick envelope summed across beats. Presets are
    //   parameter sets on that engine: emitters, particle distribution,
    //   Chladni values, assembly tilt.
    //   • Ink particles on green (no green particles here — the field
    //     inverts the hero's palette so the chartreuse band stays loud).
    //   • Hover / focus on a name switches the preset (~260 ms opacity dip
    //     covers the geometry rebuild). Auto-cycles every 6 s when idle.
    //   • Shader source is duplicated verbatim from the hero so that
    //     initHero remains untouched (frozen).
    // ═══════════════════════════════════════════════════════════════════
    function initLabs(THREE) {
      const canvas    = document.getElementById('labs-canvas');
      const previewEl = document.getElementById('labs-preview');
      const labelEl   = document.getElementById('labs-preview-label');
      if (!canvas || !previewEl || !labelEl) return;

      const LABS = window.__LABS || [];
      if (!LABS.length) return;

      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      } catch (e) {
        console.warn('[labs] WebGL init failed.', e);
        return;
      }
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setClearColor(0x000000, 0);  // transparent → chartreuse section shows through
      const pixelRatio = renderer.getPixelRatio();

      const BPM = 110;
      const BEAT_PERIOD = 60 / BPM;
      const SPEED = 0.80;
      const INK = 0x141310;
      const inkC = new THREE.Color(INK);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.z = 8;
      const assembly = new THREE.Group();
      scene.add(assembly);

      // ── PRESETS ─────────────────────────────────────────────────────
      const PRESETS = {
        manifold: {
          count: 3200,
          distribution: 'sphere',
          sphereR: 2.0,
          emitters: [
            { pos: [-1.0,  0.4,  0.3], omega: 2.1, amp: 1.05, phase: 0.00 },
            { pos: [ 1.0, -0.3,  0.3], omega: 2.3, amp: 1.05, phase: 1.05 },
            { pos: [ 0.0,  0.8, -0.4], omega: 1.8, amp: 1.05, phase: 2.10 },
          ],
          chladni: [1.8, 1.8, 0.06],
          tilt: 0.28,
        },
        frequency: {
          count: 3500,
          distribution: 'quadrants',
          quadOffset: [1.4, 1.0, 0.4],
          quadRadius: 1.05,
          emitters: [
            // "Question" pair (top), same freq/phase — beat together.
            { pos: [ 1.4, 1.0, 0], omega: 2.4, amp: 1.15, phase: 0 },
            { pos: [-1.4, 1.0, 0], omega: 2.4, amp: 1.15, phase: 0 },
            // "Answer" (bottom), opposite phase.
            { pos: [ 0.0,-1.0, 0], omega: 1.8, amp: 1.10, phase: Math.PI },
          ],
          chladni: [1.6, 2.4, 0.08],
          tilt: 0.20,
        },
        noted: {
          count: 2800,
          distribution: 'horizontal',
          stripW: 5.6, stripH: 1.0, stripD: 0.5,
          emitters: [
            { pos: [-1.8, 0.10, 0], omega: 2.2, amp: 1.00, phase: 0 },
            { pos: [ 0.0,-0.10, 0], omega: 2.6, amp: 1.15, phase: Math.PI / 2 },
            { pos: [ 1.8, 0.10, 0], omega: 2.2, amp: 1.00, phase: Math.PI },
          ],
          chladni: [3.0, 1.2, 0.08],
          tilt: 0.10,
        },
      };

      // Distribution → per-particle base positions
      function buildDist(preset, N) {
        const pos = new Float32Array(N * 3);
        const sizeA = new Float32Array(N);
        const alphaA = new Float32Array(N);
        for (let i = 0; i < N; i++) {
          let x, y, z;
          if (preset.distribution === 'sphere') {
            const r = Math.cbrt(Math.random()) * preset.sphereR;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            x = r * Math.sin(phi) * Math.cos(theta);
            y = r * Math.sin(phi) * Math.sin(theta);
            z = r * Math.cos(phi);
          } else if (preset.distribution === 'quadrants') {
            const q = i % 4;
            const [ox, oy, dz] = preset.quadOffset;
            const sx = (q === 0 || q === 3) ?  1 : -1;
            const sy = (q === 0 || q === 1) ?  1 : -1;
            const r = Math.sqrt(Math.random()) * preset.quadRadius;
            const t = Math.random() * Math.PI * 2;
            x = sx * ox + Math.cos(t) * r;
            y = sy * oy + Math.sin(t) * r;
            z = (Math.random() - 0.5) * dz;
          } else { // horizontal
            x = (Math.random() - 0.5) * preset.stripW;
            y = (Math.random() - 0.5) * preset.stripH;
            z = (Math.random() - 0.5) * preset.stripD;
          }
          pos[i*3]   = x;
          pos[i*3+1] = y;
          pos[i*3+2] = z;
          sizeA[i]  = 0.55 + Math.random() * 0.55;
          alphaA[i] = 0.38 + Math.random() * 0.22;
        }
        return { pos, sizeA, alphaA };
      }

      // ── SHADER (duplicated verbatim from hero — no shared state) ────
      const LABS_VS = /* glsl */`
        precision highp float;
        uniform float uTime;
        uniform float uSpeedScale;
        uniform float uPixelRatio;
        uniform float uSizeBase;
        uniform float uKickBoost;

        uniform vec3  uE0Pos;  uniform vec3  uE1Pos;  uniform vec3  uE2Pos;
        uniform vec3  uEOmegas;
        uniform vec3  uEAmps;
        uniform vec3  uEPhases;

        uniform vec4  uBeatTimes;
        uniform vec4  uBeatAmps;

        uniform vec2  uChladniK;
        uniform float uChladniAmp;

        attribute vec3  aColor;
        attribute float aSize;
        attribute float aAlpha;

        varying vec3  vColor;
        varying float vAlpha;

        float beatContrib(float r, float omega, float phase, float amp,
                          float beatTime, float beatAmp, float t) {
          if (beatTime < 0.0) return 0.0;
          float tau = (t - beatTime) * uSpeedScale;
          if (tau <= 0.0) return 0.0;
          float c = 2.0;
          float tauLocal = tau - r / c;
          if (tauLocal < 0.0) return 0.0;
          float attack    = 1.0 - exp(-tauLocal / 0.03);
          float localDec  = exp(-tauLocal / 0.20);
          float globalDec = exp(-tau      / 0.35);
          float envelope  = attack * localDec * globalDec;
          float k  = omega * 0.5;
          float ph = k * r - omega * tau + phase;
          return amp * beatAmp * envelope * cos(ph) / (1.0 + r * 0.15);
        }

        void main() {
          vec3 basePos = position;

          vec3  d0   = basePos - uE0Pos;
          float r0   = length(d0);
          vec3  dir0 = d0 / max(r0, 0.001);
          float uE0  = beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.x, uBeatAmps.x, uTime)
                     + beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.y, uBeatAmps.y, uTime)
                     + beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.z, uBeatAmps.z, uTime)
                     + beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.w, uBeatAmps.w, uTime);

          vec3  d1   = basePos - uE1Pos;
          float r1   = length(d1);
          vec3  dir1 = d1 / max(r1, 0.001);
          float uE1  = beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.x, uBeatAmps.x, uTime)
                     + beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.y, uBeatAmps.y, uTime)
                     + beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.z, uBeatAmps.z, uTime)
                     + beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.w, uBeatAmps.w, uTime);

          vec3  d2   = basePos - uE2Pos;
          float r2   = length(d2);
          vec3  dir2 = d2 / max(r2, 0.001);
          float uE2  = beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.x, uBeatAmps.x, uTime)
                     + beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.y, uBeatAmps.y, uTime)
                     + beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.z, uBeatAmps.z, uTime)
                     + beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.w, uBeatAmps.w, uTime);

          vec3  vecField    = dir0 * uE0 + dir1 * uE1 + dir2 * uE2;
          float scalarField = uE0 + uE1 + uE2;

          float chladni = uChladniAmp * sin(uChladniK.x * basePos.x) * sin(uChladniK.y * basePos.y);
          scalarField += chladni;
          vecField.z  += chladni * 0.35;

          vec3 displaced = basePos + vecField * 0.55;
          vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
          gl_Position = projectionMatrix * mvPosition;

          float mag = min(abs(scalarField), 1.6);
          float excited = smoothstep(0.05, 0.60, mag);
          float alphaMul = (1.0 + excited * 1.4) * (1.0 + uKickBoost * 0.5);
          float sizeMul  = (1.0 + excited * 0.55) * (1.0 + uKickBoost * 0.35);

          gl_PointSize = uSizeBase * aSize * sizeMul * uPixelRatio * (22.0 / max(-mvPosition.z, 0.1));

          vColor = aColor;
          vAlpha = aAlpha * alphaMul;
        }
      `;

      const LABS_FS = /* glsl */`
        precision mediump float;
        varying vec3  vColor;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d2 = dot(uv, uv);
          float a = smoothstep(0.24, 0.19, d2);
          if (a <= 0.001) discard;
          gl_FragColor = vec4(vColor, a * vAlpha);
        }
      `;

      const fluidGeom = new THREE.BufferGeometry();
      const fluidMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime:        { value: 0 },
          uSpeedScale:  { value: SPEED },
          uPixelRatio:  { value: pixelRatio },
          uSizeBase:    { value: 1.0 },
          uKickBoost:   { value: 0 },
          uE0Pos:       { value: new THREE.Vector3() },
          uE1Pos:       { value: new THREE.Vector3() },
          uE2Pos:       { value: new THREE.Vector3() },
          uEOmegas:     { value: new THREE.Vector3() },
          uEAmps:       { value: new THREE.Vector3() },
          uEPhases:     { value: new THREE.Vector3() },
          uBeatTimes:   { value: new THREE.Vector4(-1, -1, -1, -1) },
          uBeatAmps:    { value: new THREE.Vector4( 0,  0,  0,  0) },
          uChladniK:    { value: new THREE.Vector2(2, 2) },
          uChladniAmp:  { value: 0 },
        },
        vertexShader: LABS_VS,
        fragmentShader: LABS_FS,
        transparent: true,
        depthWrite: false,
        depthTest:  true,
        blending:   THREE.NormalBlending,
      });
      const fluid = new THREE.Points(fluidGeom, fluidMat);
      assembly.add(fluid);

      let currentChladniPeak = 0;

      // ── Apply a preset (build geometry, wire uniforms, tilt) ─────────
      function applyPreset(name) {
        const p = PRESETS[name];
        if (!p) return;
        const parts = buildDist(p, p.count);
        const N = p.count;
        const col = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
          col[i*3] = inkC.r; col[i*3+1] = inkC.g; col[i*3+2] = inkC.b;
        }
        fluidGeom.setAttribute('position', new THREE.BufferAttribute(parts.pos, 3));
        fluidGeom.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
        fluidGeom.setAttribute('aSize',    new THREE.BufferAttribute(parts.sizeA, 1));
        fluidGeom.setAttribute('aAlpha',   new THREE.BufferAttribute(parts.alphaA, 1));

        const e = p.emitters;
        fluidMat.uniforms.uE0Pos.value.set(e[0].pos[0], e[0].pos[1], e[0].pos[2]);
        fluidMat.uniforms.uE1Pos.value.set(e[1].pos[0], e[1].pos[1], e[1].pos[2]);
        fluidMat.uniforms.uE2Pos.value.set(e[2].pos[0], e[2].pos[1], e[2].pos[2]);
        fluidMat.uniforms.uEOmegas.value.set(e[0].omega, e[1].omega, e[2].omega);
        fluidMat.uniforms.uEAmps.value.set  (e[0].amp,   e[1].amp,   e[2].amp);
        fluidMat.uniforms.uEPhases.value.set(e[0].phase, e[1].phase, e[2].phase);
        fluidMat.uniforms.uChladniK.value.set(p.chladni[0], p.chladni[1]);
        currentChladniPeak = p.chladni[2];

        assembly.rotation.x = p.tilt;
        assembly.rotation.z = 0;
      }

      // ── Resize (ResizeObserver keeps it in sync when the panel changes) ──
      function resize() {
        const rect = canvas.getBoundingClientRect();
        const w = Math.max(1, Math.floor(rect.width));
        const h = Math.max(1, Math.floor(rect.height));
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        fluidMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
      const ro = new ResizeObserver(resize);
      ro.observe(previewEl);
      window.addEventListener('resize', resize);

      // ── Beat clock (independent instance from hero) ────────────────
      const CLOCK_PREADVANCE = BEAT_PERIOD * 4 + 0.15;
      const clock = new THREE.Clock(false);
      const currentT = () => clock.getElapsedTime() + CLOCK_PREADVANCE;

      const beatTimesArr = [-1, -1, -1, -1];
      const beatAmpsArr  = [ 0,  0,  0,  0];

      function updateBeatState(T) {
        const idx = Math.floor(T / BEAT_PERIOD);
        for (let k = 0; k < 4; k++) {
          const bi = idx - k;
          if (bi >= 0) {
            beatTimesArr[k] = bi * BEAT_PERIOD;
            beatAmpsArr[k]  = (bi % 4 === 0) ? 1.35 : 0.85;
          } else {
            beatTimesArr[k] = -1;
            beatAmpsArr[k]  = 0;
          }
        }
        fluidMat.uniforms.uBeatTimes.value.set(beatTimesArr[0], beatTimesArr[1], beatTimesArr[2], beatTimesArr[3]);
        fluidMat.uniforms.uBeatAmps.value.set(beatAmpsArr[0], beatAmpsArr[1], beatAmpsArr[2], beatAmpsArr[3]);

        // Kick envelope summed across the 4 tracked beats (matches hero).
        let kick = 0;
        for (let k = 0; k < 4; k++) {
          const bt = beatTimesArr[k];
          if (bt < 0) continue;
          const tauK = (T - bt) * SPEED;
          if (tauK <= 0) continue;
          const attackK = 1 - Math.exp(-tauK / 0.03);
          const decayK  = Math.exp(-tauK / 0.35);
          const peakK   = beatAmpsArr[k] > 1.0 ? 0.55 : 0.30;
          kick += peakK * attackK * decayK;
        }
        fluidMat.uniforms.uKickBoost.value = kick;

        // Chladni amplitude modulates slowly, scaled by the preset's peak.
        fluidMat.uniforms.uChladniAmp.value = currentChladniPeak * (0.5 + 0.5 * Math.sin(T * SPEED * 0.035));
      }

      function frame(T) {
        updateBeatState(T);
        fluidMat.uniforms.uTime.value = T;
        renderer.render(scene, camera);
      }

      // ── Preset switching + hover + cycle ───────────────────────────
      const rows  = document.querySelectorAll('.labs-index-row');
      const links = document.querySelectorAll('.labs-name-link');
      let currentIdx = 0;
      let hoveredIdx = null;
      let cycleTimer = null;

      function goTo(idx, animate = true) {
        currentIdx = idx;
        rows.forEach((row, i) => row.classList.toggle('is-active', i === idx));
        labelEl.textContent = LABS[idx].name;
        if (animate) {
          previewEl.classList.add('is-switching');
          setTimeout(() => {
            applyPreset(LABS[idx].enginePreset);
            setTimeout(() => previewEl.classList.remove('is-switching'), 30);
          }, 260);
        } else {
          applyPreset(LABS[idx].enginePreset);
        }
      }

      links.forEach((link, i) => {
        link.addEventListener('mouseenter', () => {
          hoveredIdx = i;
          if (i !== currentIdx) goTo(i);
        });
        link.addEventListener('mouseleave', () => { hoveredIdx = null; });
        link.addEventListener('focus', () => {
          hoveredIdx = i;
          if (i !== currentIdx) goTo(i);
        });
        link.addEventListener('blur', () => { hoveredIdx = null; });
      });

      cycleTimer = setInterval(() => {
        if (hoveredIdx !== null) return;
        const next = (currentIdx + 1) % LABS.length;
        goTo(next);
      }, 6000);

      // Initial state (no fade)
      goTo(0, false);
      resize();

      // First frame + start rAF
      frame(currentT());
      clock.start();
      function tickLabs() {
        frame(currentT());
        requestAnimationFrame(tickLabs);
      }
      requestAnimationFrame(tickLabs);
    }
  </script>
</body>
</html>
