<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Melomaniac Studios — A house for sound</title>
  <meta name="description" content="Melomaniac Studios — a house for sound. Toronto.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Preload the local three.js module so the fetch overlaps HTML parsing.
       With cache disabled + throttled network this is the difference between
       "reveal within ~200 ms" and "reveal after ~1 s". -->
  <link rel="modulepreload" href="./vendor/three.module.min.js">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #B8F06E;
      --green-ink: #24350D;
      --paper: #F5F3EC;
      --paper-deep: #ECE9DF;
      --ink: #141310;
      --ink-soft: rgba(20,19,16,.55);
      --ink-mute: rgba(20,19,16,.34);
      --hairline: rgba(20,19,16,.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; background: var(--paper); }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: var(--green); color: var(--ink); }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { text-wrap: balance; }

    /* ── LOADING COVER ─────────────────────────────────────────────
       Ivory overlay above everything, present from HTML parse. It hides
       the whole page until either the WebGL piece has its first frame
       in the backbuffer (body.hero-live) or we've decided to fall back
       to the static poster (body.hero-poster). No opacity transition —
       the user never sees a composition swap, only a hard reveal of
       the finished piece.

       Position: fixed, z-index above everything. Covers the visible
       area including any letterboxed SVG whitespace. Because html+body
       are both painted --paper, the "blank ivory moment" is truly
       blank ivory — no fonts loading in / no partial layout visible. */
    #loading-cover {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 999;
      pointer-events: none;
    }
    body.hero-live #loading-cover,
    body.hero-poster #loading-cover { display: none; }

    /* Canvas vs poster visibility.
       Default: canvas is the display (used by hero-live).
       Poster is only shown when we've decided to fall back —
       never as a loading state. */
    .hero-svg { opacity: 0; pointer-events: none; }
    #hero-canvas { opacity: 1; }
    body.hero-poster .hero-svg { opacity: 1; }
    body.hero-poster #hero-canvas { display: none; }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background: var(--paper);
    }
    .hero-stage {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .hero-svg, #hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      min-height: 100svh;
      padding: 2.4rem clamp(1.5rem, 4vw, 3.5rem) 1.8rem;
      pointer-events: none;
    }
    .hero-content > * { pointer-events: auto; }

    .hero-content::before {
      content: '';
      position: absolute;
      left: -6%;
      top: 18%;
      width: 78%;
      height: 62%;
      background: radial-gradient(ellipse at 32% 50%, rgba(245,243,236,.62) 0%, rgba(245,243,236,0) 62%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .85rem;
      font-size: .68rem; letter-spacing: .34em; text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      align-self: start; justify-self: start;
    }
    .hero-eyebrow::before {
      content: ''; width: 30px; height: 1px; background: var(--ink);
    }

    .hero-main {
      align-self: center;
      max-width: min(60ch, 100%);
      display: flex; flex-direction: column;
      gap: 1.4rem;
    }
    .hero-wordmark {
      font-family: 'Fraunces', 'Instrument Serif', Georgia, serif;
      font-variation-settings: 'opsz' 144;
      font-weight: 300;
      font-size: clamp(4.2rem, 13.4vw, 12.8rem);
      line-height: .86;
      letter-spacing: -.028em;
      color: var(--ink);
      display: flex; flex-direction: column;
    }
    .hero-wordmark .w-a { display: block; }
    .hero-wordmark .w-b {
      display: block;
      font-style: italic;
      font-weight: 300;
      padding-left: .06em;
      margin-top: -.015em;
    }
    .hero-tagline {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 24;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 1.55vw, 1.5rem);
      line-height: 1.35;
      color: var(--ink-soft);
      max-width: 30ch;
    }

    .hero-scroll {
      justify-self: center;
      display: inline-flex; flex-direction: column; align-items: center; gap: .55rem;
      font-size: .55rem; letter-spacing: .38em; text-transform: uppercase;
      color: var(--ink-mute); font-weight: 500;
    }
    .hero-scroll .line {
      display: block;
      width: 1px; height: 22px;
      background: var(--ink-mute);
      transform-origin: top center;
      animation: scrollpulse 3.5s ease-in-out infinite;
    }
    @keyframes scrollpulse {
      0%, 100% { transform: scaleY(.5); opacity: .5; }
      50%      { transform: scaleY(1);  opacity: 1; }
    }

    @media (max-width: 720px) {
      .hero-content { padding: 2rem 1.5rem 1.4rem; }
      .hero-content::before { display: none; }
    }

    /* Reduced motion → static SVG poster is the display, canvas never lights up. */
    @media (prefers-reduced-motion: reduce) {
      .hero-scroll .line { animation: none; opacity: .6; }
      html { scroll-behavior: auto; }
      #hero-canvas { display: none; }
      .hero-svg { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Loading cover: hides everything until first paint is the finished piece. -->
  <div id="loading-cover"></div>

  <main>
    <section class="hero">
      <div class="hero-stage">
        <svg class="hero-svg" id="hero-svg" viewBox="-3.4 -3.4 6.8 6.8" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <canvas id="hero-canvas" aria-hidden="true"></canvas>
      </div>
      <div class="hero-content">
        <div class="hero-eyebrow"><span>Melomaniac Studios · Toronto</span></div>
        <div class="hero-main">
          <h1 class="hero-wordmark">
            <span class="w-a">Melomaniac</span>
            <span class="w-b">Studios</span>
          </h1>
          <p class="hero-tagline">A house for sound.</p>
        </div>
        <div class="hero-scroll">
          <span>Scroll</span>
          <span class="line" aria-hidden="true"></span>
        </div>
      </div>
    </section>
  </main>

  <!--
    SVG poster.
    ONLY shown as (a) no-WebGL / import-failure fallback, (b) reduced-motion.
    Never as a loading state.
    Snapshot: emitters just fired (beat 0), rings frozen partway through
    their first propagation — reads as a still frame from the piece.
  -->
  <script>
  (function buildStaticPoster(){
    const svg = document.getElementById('hero-svg');
    if (!svg) return;

    const now = new Date();
    const seed = (
      (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
      + now.getHours() * 60 + now.getMinutes()
    ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
    let s = seed >>> 0;
    const rng = () => {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const rand = (a, b) => a + rng() * (b - a);

    const INK       = 'rgba(20,19,16,.55)';
    const INK_FAINT = 'rgba(20,19,16,.20)';
    const GREEN     = '#B8F06E';

    // Same emitter seeding order as the WebGL initHero — poster shows a
    // snapshot with beat rings already in mid-propagation.
    const emitters = [];
    for (let i = 0; i < 3; i++) {
      emitters.push({
        x: rand(-1.8, 1.8),
        y: rand(-1.2, 1.2),
        z: rand(-0.6, 0.6),   // consumed to keep the seed stream aligned
        omega: rand(1.6, 3.0),
        amp:   rand(0.75, 1.15),
        phase: rand(0, Math.PI * 2),
      });
    }

    // Static wavepacket snapshot at a fixed "mid-decay" tau per emitter.
    // Approximates the WebGL model (beat rings expanding at c=2, gaussian ring).
    const TAU_SNAPSHOT = 0.45;
    const C = 2.0;
    const SIGMA = 0.5;
    function scalarField(x, y) {
      let f = 0;
      const ringR = C * TAU_SNAPSHOT;
      const ageEnv = Math.exp(-TAU_SNAPSHOT / 0.32);
      for (const e of emitters) {
        const dx = x - e.x, dy = y - e.y;
        const r = Math.hypot(dx, dy);
        const k = e.omega * 0.5;
        const distFromRing = r - ringR;
        const ringEnv = Math.exp(-(distFromRing * distFromRing) / (2 * SIGMA * SIGMA));
        const phase = k * r - e.omega * TAU_SNAPSHOT + e.phase;
        f += e.amp * ringEnv * ageEnv * Math.cos(phase) / (1 + r * 0.15);
      }
      return f;
    }

    // Green particle scatter — the primary visual.
    const scatter = [];
    const N = 1200;
    for (let i = 0; i < N; i++) {
      let x, y;
      do { x = rand(-3.05, 3.05); y = rand(-3.05, 3.05); }
      while (x*x + y*y > 8.7);
      const f = scalarField(x, y);
      const mag = Math.min(Math.abs(f), 1.5);
      const gate = Math.max(0, (mag - 0.03) / 0.5);
      const alpha = 0.14 + 0.80 * Math.min(1, gate);
      const r = rand(0.010, 0.021);
      const isInk = rng() < 0.08;
      const color = isInk ? INK : GREEN;
      scatter.push(
        `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r.toFixed(3)}" fill="${color}" fill-opacity="${alpha.toFixed(2)}"/>`
      );
    }

    svg.innerHTML = [
      `<g>${scatter.join('')}</g>`,
      `<circle cx="0" cy="0" r="2.85" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="2.05" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="1.35" fill="none" stroke="${INK_FAINT}" stroke-width=".009"/>`,
    ].join('');
  })();
  </script>

  <!--
    WebGL piece. 110 BPM beat clock; every element samples the same
    shared wave field. Mouse behavior preserved from the previous pass.

    Reveal contract:
      • Loading cover hides everything from HTML parse.
      • Module imports three.js (preloaded).
      • initHero: pre-renders the FIRST FRAME at a pre-advanced clock
        (so multiple beats already in flight → composition is alive),
        THEN removes the loading cover in the same task.
      • Fallback: if module/WebGL fail, or a 3.0 s timeout elapses,
        the poster is revealed instead. Never a composition swap.
  -->
  <script type="module">
    const REVEAL_TIMEOUT_MS = 3000;

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.body.classList.add('hero-poster');
    } else {
      const fallbackTimer = setTimeout(() => {
        console.warn('[hero] Init timed out — poster fallback.');
        document.body.classList.add('hero-poster');
      }, REVEAL_TIMEOUT_MS);
      try {
        const THREE = await import('./vendor/three.module.min.js');
        initHero(THREE, () => {
          clearTimeout(fallbackTimer);
          document.body.classList.add('hero-live');
        });
      } catch (err) {
        clearTimeout(fallbackTimer);
        console.warn('[hero] Module unavailable — poster fallback.', err);
        document.body.classList.add('hero-poster');
      }
    }

    function initHero(THREE, onFirstFrameReady) {
      const canvas = document.getElementById('hero-canvas');
      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      } catch (e) {
        console.warn('[hero] WebGL unavailable — poster fallback.', e);
        document.body.classList.add('hero-poster');
        return;
      }

      const INK   = 0x141310;
      const GREEN = 0xB8F06E;
      const PAPER = 0xF5F3EC;

      // ── The two knobs ────────────────────────────────────────────────
      // BPM is LOCKED at 110 (the piece is on a sound system).
      // SPEED scales the wave physics — how long each beat's ring takes
      // to travel/decay — without changing when beats fire.
      const BPM = 110;
      const BEAT_PERIOD = 60 / BPM;   // 0.5454545 s
      const SPEED = 0.80;

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setClearColor(PAPER, 1);
      const pixelRatio = renderer.getPixelRatio();

      // ── Seeded RNG (mulberry32) ─────────────────────────────────────
      const now = new Date();
      const seed = (
        (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
        + now.getHours() * 60 + now.getMinutes()
      ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
      let s = seed >>> 0;
      const rng = () => {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
      const rand = (a, b) => a + rng() * (b - a);

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.z = 8;

      const assembly = new THREE.Group();
      scene.add(assembly);

      // ── Emitters (seeded, stationary) ────────────────────────────────
      const emitters = [];
      for (let i = 0; i < 3; i++) {
        emitters.push({
          pos:   new THREE.Vector3(rand(-1.8, 1.8), rand(-1.2, 1.2), rand(-0.6, 0.6)),
          omega: rand(1.6, 3.0),
          amp:   rand(0.75, 1.15),
          phase: rand(0, Math.PI * 2),
        });
      }

      // Chladni background pattern — quiet standing wave that rises/recedes
      // over minutes so nodal grids emerge and dissolve underneath the beats.
      const chladniKx = rand(1.4, 2.8);
      const chladniKy = rand(1.4, 2.8);

      // Mouse-as-emitter (kept exactly as in the previous pass).
      const mouseLocal = new THREE.Vector3(999, 999, 999);
      let mouseAmp = 0.0;
      const mouseFreq = rand(2.2, 3.4);

      // ── Fluid particles ──────────────────────────────────────────────
      function chooseCount(w) {
        if (w >= 1400) return 7000;
        if (w >= 1000) return 5000;
        if (w >= 640)  return 3000;
        return 1800;
      }
      const N = chooseCount(window.innerWidth);

      const pos    = new Float32Array(N * 3);
      const col    = new Float32Array(N * 3);
      const sizeA  = new Float32Array(N);
      const alphaA = new Float32Array(N);
      const gr = new THREE.Color(GREEN);
      const inkC = new THREE.Color(INK);

      for (let i = 0; i < N; i++) {
        const r  = Math.sqrt(rng()) * 3.05;
        const th = rng() * Math.PI * 2;
        pos[i*3]   = Math.cos(th) * r;
        pos[i*3+1] = Math.sin(th) * r;
        pos[i*3+2] = (rng() - 0.5) * 0.9;
        sizeA[i]  = rand(0.55, 1.1);
        alphaA[i] = rand(0.45, 0.95);
        const isInk = rng() < 0.08;
        const c = isInk ? inkC : gr;
        col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
      }

      const fluidGeom = new THREE.BufferGeometry();
      fluidGeom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      fluidGeom.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
      fluidGeom.setAttribute('aSize',    new THREE.BufferAttribute(sizeA, 1));
      fluidGeom.setAttribute('aAlpha',   new THREE.BufferAttribute(alphaA, 1));

      // ── Vertex shader: BEAT-DRIVEN WAVE FIELD ────────────────────────
      // Each beat, every emitter fires a WAVEPACKET — a Gaussian-enveloped
      // ring propagating at c = 2 and decaying with tau_env ≈ 0.32 s. We
      // track the 3 most recent beat times so up to 3 concentric rings from
      // each emitter are in flight simultaneously. Between beats, energy
      // decays → the field visibly settles toward rest. Downbeats (every 4th
      // beat) fire louder. Mouse layered on top as a continuous emitter.
      const FLUID_VS = /* glsl */`
        precision highp float;
        uniform float uTime;             // effective time (real clock, pre-advanced on load)
        uniform float uSpeedScale;       // SPEED — scales physics tau
        uniform float uPixelRatio;
        uniform float uSizeBase;
        uniform float uKickBoost;        // 0 at rest, up to ~0.30 at beat peak

        uniform vec3  uE0Pos;  uniform vec3  uE1Pos;  uniform vec3  uE2Pos;
        uniform vec3  uEOmegas;
        uniform vec3  uEAmps;
        uniform vec3  uEPhases;

        uniform vec3  uBeatTimes;        // (t_beat_-0, t_beat_-1, t_beat_-2) most recent → oldest
        uniform vec3  uBeatAmps;         // matching per-beat amplitude (downbeat accent)

        uniform vec3  uMousePos;
        uniform float uMouseAmp;
        uniform float uMouseFreq;

        uniform vec2  uChladniK;
        uniform float uChladniAmp;

        attribute vec3  aColor;
        attribute float aSize;
        attribute float aAlpha;

        varying vec3  vColor;
        varying float vAlpha;

        // Scalar contribution of one beat from one emitter.
        // Returned as vec2(u, one_over_falloff) so we can compute vector
        // contribution outside by multiplying by dir once.
        //   u = amp · beatAmp · ringEnv · ageEnv · cos(k·r − ω·τ + φ) / (1 + α·r)
        //     ringEnv = exp(−(r − c·τ)² / 2σ²),  σ = 0.5, c = 2
        //     ageEnv  = exp(−τ / 0.32)
        //   Returns 0 if the beat hasn't fired yet (bt < 0 sentinel).
        float beatContrib(float r, float omega, float phase, float amp,
                          float beatTime, float beatAmp, float t) {
          if (beatTime < 0.0) return 0.0;
          float tau = (t - beatTime) * uSpeedScale;
          if (tau <= 0.0) return 0.0;
          float k = omega * 0.5;         // c = ω/k = 2
          float ringR = 2.0 * tau;
          float distFromRing = r - ringR;
          float ringEnv = exp(-(distFromRing * distFromRing) / 0.5);   // 2·σ² with σ=0.5
          float ageEnv  = exp(-tau / 0.32);
          float ph = k * r - omega * tau + phase;
          return amp * beatAmp * ringEnv * ageEnv * cos(ph) / (1.0 + r * 0.15);
        }

        // Continuous sinusoidal wave (used only by the mouse emitter — its
        // ripple-and-decay behavior is preserved verbatim from the last pass).
        float continuousContrib(float r, float omega, float amp, float t) {
          float k = omega * 0.75;
          float tS = t * uSpeedScale;
          return amp * sin(k * r - omega * tS) / (1.0 + r * 0.35);
        }

        void main() {
          vec3 basePos = position;

          // Emitter 0
          vec3  d0   = basePos - uE0Pos;
          float r0   = length(d0);
          vec3  dir0 = d0 / max(r0, 0.001);
          float u00  = beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.x, uBeatAmps.x, uTime);
          float u01  = beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.y, uBeatAmps.y, uTime);
          float u02  = beatContrib(r0, uEOmegas.x, uEPhases.x, uEAmps.x, uBeatTimes.z, uBeatAmps.z, uTime);
          float uE0  = u00 + u01 + u02;

          // Emitter 1
          vec3  d1   = basePos - uE1Pos;
          float r1   = length(d1);
          vec3  dir1 = d1 / max(r1, 0.001);
          float u10  = beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.x, uBeatAmps.x, uTime);
          float u11  = beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.y, uBeatAmps.y, uTime);
          float u12  = beatContrib(r1, uEOmegas.y, uEPhases.y, uEAmps.y, uBeatTimes.z, uBeatAmps.z, uTime);
          float uE1  = u10 + u11 + u12;

          // Emitter 2
          vec3  d2   = basePos - uE2Pos;
          float r2   = length(d2);
          vec3  dir2 = d2 / max(r2, 0.001);
          float u20  = beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.x, uBeatAmps.x, uTime);
          float u21  = beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.y, uBeatAmps.y, uTime);
          float u22  = beatContrib(r2, uEOmegas.z, uEPhases.z, uEAmps.z, uBeatTimes.z, uBeatAmps.z, uTime);
          float uE2  = u20 + u21 + u22;

          vec3  vecField    = dir0 * uE0 + dir1 * uE1 + dir2 * uE2;
          float scalarField = uE0 + uE1 + uE2;

          // Mouse: continuous sinusoidal source, same time reference as beats
          // so it INTERFERES with the beat field cleanly.
          if (uMouseAmp > 0.001) {
            vec3  dm   = basePos - uMousePos;
            float rm   = length(dm);
            vec3  dirm = dm / max(rm, 0.001);
            float um   = continuousContrib(rm, uMouseFreq, uMouseAmp, uTime);
            vecField    += dirm * um;
            scalarField += um;
          }

          // Chladni standing wave — quiet background nodal pattern.
          float chladni = uChladniAmp * sin(uChladniK.x * basePos.x) * sin(uChladniK.y * basePos.y);
          scalarField += chladni;
          vecField.z  += chladni * 0.35;

          // Displace along the vector field. Amplitude scaled so beats push
          // particles visibly on the hit and let them settle back between.
          vec3 displaced = basePos + vecField * 0.55;

          vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
          gl_Position = projectionMatrix * mvPosition;

          // Brightness/size from |scalar field| — wavefronts as visible bands
          // sweeping through the cloud. uKickBoost adds a transient "hit"
          // globally on each beat (bigger on downbeats).
          float mag  = min(abs(scalarField), 1.6);
          float gate = smoothstep(0.03, 0.55, mag);
          float szm  = (0.55 + 0.90 * gate) * (1.0 + uKickBoost * 0.40);

          gl_PointSize = uSizeBase * aSize * szm * uPixelRatio * (22.0 / max(-mvPosition.z, 0.1));

          vColor = aColor;
          vAlpha = aAlpha * (0.14 + 0.90 * gate) * (1.0 + uKickBoost * 0.50);
        }
      `;

      const FLUID_FS = /* glsl */`
        precision mediump float;
        varying vec3  vColor;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d2 = dot(uv, uv);
          float a = smoothstep(0.24, 0.19, d2);
          if (a <= 0.001) discard;
          gl_FragColor = vec4(vColor, a * vAlpha);
        }
      `;

      const fluidMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime:        { value: 0 },
          uSpeedScale:  { value: SPEED },
          uPixelRatio:  { value: pixelRatio },
          uSizeBase:    { value: 1.0 },
          uKickBoost:   { value: 0 },
          uE0Pos:       { value: emitters[0].pos },
          uE1Pos:       { value: emitters[1].pos },
          uE2Pos:       { value: emitters[2].pos },
          uEOmegas:     { value: new THREE.Vector3(emitters[0].omega, emitters[1].omega, emitters[2].omega) },
          uEAmps:       { value: new THREE.Vector3(emitters[0].amp,   emitters[1].amp,   emitters[2].amp) },
          uEPhases:     { value: new THREE.Vector3(emitters[0].phase, emitters[1].phase, emitters[2].phase) },
          uBeatTimes:   { value: new THREE.Vector3(-1, -1, -1) },
          uBeatAmps:    { value: new THREE.Vector3( 0,  0,  0) },
          uMousePos:    { value: mouseLocal },
          uMouseAmp:    { value: 0 },
          uMouseFreq:   { value: mouseFreq },
          uChladniK:    { value: new THREE.Vector2(chladniKx, chladniKy) },
          uChladniAmp:  { value: 0 },
        },
        vertexShader: FLUID_VS,
        fragmentShader: FLUID_FS,
        transparent: true,
        depthWrite: false,
        depthTest:  true,
        blending:   THREE.NormalBlending,
      });

      const fluid = new THREE.Points(fluidGeom, fluidMat);
      assembly.add(fluid);

      // ── Architecture whisper: 3 hairline circles that sample the same field ──
      function makeCircle(radiusBase, colorHex, opacity, z, segments=128) {
        const positions = new Float32Array(segments * 3);
        for (let i = 0; i < segments; i++) {
          const t = (i / segments) * Math.PI * 2;
          positions[i*3]   = Math.cos(t) * radiusBase;
          positions[i*3+1] = Math.sin(t) * radiusBase;
          positions[i*3+2] = z;
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const line = new THREE.LineLoop(geom, new THREE.LineBasicMaterial({
          color: colorHex, transparent: true, opacity, depthWrite: false,
        }));
        line.userData = { basePositions: positions.slice() };
        return line;
      }

      const circles = [
        makeCircle(2.85, INK, 0.15, -0.12),
        makeCircle(2.05, INK, 0.17,  0.02),
        makeCircle(1.35, INK, 0.22,  0.14),
      ];
      circles.forEach(c => assembly.add(c));

      // JS mirror of one beat's scalar contribution (matches shader beatContrib).
      function beatContribJS(r, omega, phase, amp, beatTime, beatAmp, t) {
        if (beatTime < 0) return 0;
        const tau = (t - beatTime) * SPEED;
        if (tau <= 0) return 0;
        const k = omega * 0.5;
        const ringR = 2.0 * tau;
        const distFromRing = r - ringR;
        const ringEnv = Math.exp(-(distFromRing * distFromRing) / 0.5);
        const ageEnv  = Math.exp(-tau / 0.32);
        const ph = k * r - omega * tau + phase;
        return amp * beatAmp * ringEnv * ageEnv * Math.cos(ph) / (1 + r * 0.15);
      }
      // JS mirror of full scalar field. Used by circle deform.
      function scalarFieldJS(bx, by, bz, T, beatTimes, beatAmps) {
        let f = 0;
        for (let j = 0; j < 3; j++) {
          const e = emitters[j];
          const dx = bx - e.pos.x, dy = by - e.pos.y, dz = bz - e.pos.z;
          const r  = Math.sqrt(dx*dx + dy*dy + dz*dz);
          f += beatContribJS(r, e.omega, e.phase, e.amp, beatTimes[0], beatAmps[0], T);
          f += beatContribJS(r, e.omega, e.phase, e.amp, beatTimes[1], beatAmps[1], T);
          f += beatContribJS(r, e.omega, e.phase, e.amp, beatTimes[2], beatAmps[2], T);
        }
        if (mouseAmp > 0.001) {
          const dx = bx - mouseLocal.x, dy = by - mouseLocal.y, dz = bz - mouseLocal.z;
          const r  = Math.sqrt(dx*dx + dy*dy + dz*dz);
          const k  = mouseFreq * 0.75;
          const tS = T * SPEED;
          f += mouseAmp * Math.sin(k * r - mouseFreq * tS) / (1 + r * 0.35);
        }
        const chAmp = fluidMat.uniforms.uChladniAmp.value;
        f += chAmp * Math.sin(chladniKx * bx) * Math.sin(chladniKy * by);
        return f;
      }

      function deformCircles(T, beatTimes, beatAmps) {
        for (const c of circles) {
          const posAttr = c.geometry.attributes.position;
          const base = c.userData.basePositions;
          const M = posAttr.count;
          const arr = posAttr.array;
          for (let i = 0; i < M; i++) {
            const bx = base[i*3];
            const by = base[i*3+1];
            const bz = base[i*3+2];
            const f = scalarFieldJS(bx, by, bz, T, beatTimes, beatAmps);
            const dispR = f * 0.08;
            const n2 = bx*bx + by*by;
            if (n2 > 1e-4) {
              const inv = 1 / Math.sqrt(n2);
              arr[i*3]   = bx + bx * inv * dispR;
              arr[i*3+1] = by + by * inv * dispR;
            } else {
              arr[i*3]   = bx;
              arr[i*3+1] = by;
            }
            arr[i*3+2] = bz + f * 0.028;
          }
          posAttr.needsUpdate = true;
        }
      }

      // ── Camera / composition ─────────────────────────────────────────
      const baseTiltX = 0.28;
      assembly.rotation.x = baseTiltX;
      assembly.rotation.z = rng() * Math.PI * 2;

      function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h, false);
        const aspect = w / h;
        camera.aspect = aspect;
        camera.position.z = aspect >= 1.15 ? 8 : (aspect >= 0.85 ? 9.2 : (8 / Math.max(aspect, 0.42)));
        camera.updateProjectionMatrix();
        const isWide = aspect >= 1.4;
        const isMed  = aspect >= 0.95;
        assembly.position.x = isWide ? 1.2 : (isMed ? 0.5 : 0);
        assembly.scale.setScalar(isWide ? 1.0 : (isMed ? 0.9 : 0.82));
        fluidMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
      resize();
      window.addEventListener('resize', resize);

      // ── Mouse-as-emitter (unchanged behavior) ────────────────────────
      const raycaster = new THREE.Raycaster();
      const mouseNDC  = new THREE.Vector2();
      const _tmpWorld = new THREE.Vector3();
      const _plane    = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
      let pendingPointer = null;
      window.addEventListener('pointermove', (e) => {
        pendingPointer = { x: e.clientX, y: e.clientY };
      }, { passive: true });
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length) {
          pendingPointer = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }, { passive: true });
      function pumpPointer() {
        if (!pendingPointer) return;
        mouseNDC.x =  (pendingPointer.x / window.innerWidth)  * 2 - 1;
        mouseNDC.y = -(pendingPointer.y / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouseNDC, camera);
        if (raycaster.ray.intersectPlane(_plane, _tmpWorld)) {
          const clone = _tmpWorld.clone();
          assembly.worldToLocal(clone);
          mouseLocal.copy(clone);
          fluidMat.uniforms.uMousePos.value.copy(mouseLocal);
          mouseAmp = 1.0;
        }
        pendingPointer = null;
      }

      // ── Beat clock ───────────────────────────────────────────────────
      const beatTimesArr = [-1, -1, -1];
      const beatAmpsArr  = [ 0,  0,  0];
      function updateBeatState(T) {
        const idx = Math.floor(T / BEAT_PERIOD);
        for (let k = 0; k < 3; k++) {
          const bi = idx - k;
          if (bi >= 0) {
            beatTimesArr[k] = bi * BEAT_PERIOD;
            // Downbeat every 4th beat (bar structure): index 0, 4, 8, …
            beatAmpsArr[k]  = (bi % 4 === 0) ? 1.35 : 0.85;
          } else {
            beatTimesArr[k] = -1;
            beatAmpsArr[k]  = 0;
          }
        }
        fluidMat.uniforms.uBeatTimes.value.set(beatTimesArr[0], beatTimesArr[1], beatTimesArr[2]);
        fluidMat.uniforms.uBeatAmps.value.set(beatAmpsArr[0],   beatAmpsArr[1],   beatAmpsArr[2]);

        // Kick envelope for global size/brightness modulation.
        // Attack ~30 ms → exponential decay ~300 ms, all in effective time.
        const tau0 = (T - beatTimesArr[0]) * SPEED;
        const attack = Math.min(tau0 / 0.030, 1.0);
        const decay  = Math.exp(-Math.max(0, tau0 - 0.030) / 0.30);
        const isDown = beatAmpsArr[0] > 1.0;
        const peak   = isDown ? 0.30 : 0.18;
        fluidMat.uniforms.uKickBoost.value = attack * decay * peak;

        // Chladni amplitude — very slow rise/recede over minutes.
        fluidMat.uniforms.uChladniAmp.value = 0.10 * (0.5 + 0.5 * Math.sin(T * SPEED * 0.035));
      }

      // ── Pre-advance the clock so the FIRST FRAME shows the piece already ──
      // alive — several beats already fired, rings mid-flight. Without this,
      // the very first render happens at T=0 with no waves in the field yet.
      const CLOCK_PREADVANCE = BEAT_PERIOD * 2 + 0.10;   // ~1.19 s
      const clock = new THREE.Clock(false);
      function currentT() { return clock.getElapsedTime() + CLOCK_PREADVANCE; }

      function frame(T) {
        // Assembly drift stays extremely subtle — the beat is the primary motion.
        const driftY = Math.sin(T * SPEED * 0.075) * 0.18;
        const driftX = Math.sin(T * SPEED * 0.11)  * 0.045;
        assembly.rotation.y = driftY;
        assembly.rotation.x = baseTiltX + driftX;
        assembly.updateMatrixWorld(true);

        pumpPointer();
        mouseAmp *= 0.985;
        if (mouseAmp < 0.001) mouseAmp = 0;
        fluidMat.uniforms.uMouseAmp.value = mouseAmp;

        updateBeatState(T);
        fluidMat.uniforms.uTime.value = T;

        deformCircles(T, beatTimesArr, beatAmpsArr);

        renderer.render(scene, camera);
      }

      // ── First-paint contract ─────────────────────────────────────────
      // Render the first FULL frame at T = CLOCK_PREADVANCE (multiple beats
      // already in the field), then reveal — synchronously in the same task,
      // so the very first paint the user sees IS this frame.
      const T0 = CLOCK_PREADVANCE;
      frame(T0);
      onFirstFrameReady();

      // Now start the real clock and enter the rAF loop.
      clock.start();
      function tick() {
        frame(currentT());
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
