<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Melomaniac Studios — A house for sound</title>
  <meta name="description" content="Melomaniac Studios — a house for sound. Toronto.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #B8F06E;
      --green-ink: #24350D;
      --paper: #F5F3EC;
      --paper-deep: #ECE9DF;
      --ink: #141310;
      --ink-soft: rgba(20,19,16,.55);
      --ink-mute: rgba(20,19,16,.34);
      --hairline: rgba(20,19,16,.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: var(--green); color: var(--ink); }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { text-wrap: balance; }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background: var(--paper);
    }
    .hero-stage {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .hero-svg, #hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .hero-svg {
      opacity: 1;
      transition: opacity .9s ease .15s;
    }
    #hero-canvas {
      opacity: 0;
      transition: opacity .9s ease;
    }
    body.webgl-ready .hero-svg { opacity: 0; }
    body.webgl-ready #hero-canvas { opacity: 1; }

    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      min-height: 100svh;
      padding: 2.4rem clamp(1.5rem, 4vw, 3.5rem) 1.8rem;
      pointer-events: none;
    }
    .hero-content > * { pointer-events: auto; }

    .hero-content::before {
      content: '';
      position: absolute;
      left: -6%;
      top: 18%;
      width: 78%;
      height: 62%;
      background: radial-gradient(ellipse at 32% 50%, rgba(245,243,236,.62) 0%, rgba(245,243,236,0) 62%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .85rem;
      font-size: .68rem; letter-spacing: .34em; text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      align-self: start; justify-self: start;
    }
    .hero-eyebrow::before {
      content: ''; width: 30px; height: 1px; background: var(--ink);
    }

    .hero-main {
      align-self: center;
      max-width: min(60ch, 100%);
      display: flex; flex-direction: column;
      gap: 1.4rem;
    }
    .hero-wordmark {
      font-family: 'Fraunces', 'Instrument Serif', Georgia, serif;
      font-variation-settings: 'opsz' 144;
      font-weight: 300;
      font-size: clamp(4.2rem, 13.4vw, 12.8rem);
      line-height: .86;
      letter-spacing: -.028em;
      color: var(--ink);
      display: flex; flex-direction: column;
    }
    .hero-wordmark .w-a { display: block; }
    .hero-wordmark .w-b {
      display: block;
      font-style: italic;
      font-weight: 300;
      padding-left: .06em;
      margin-top: -.015em;
    }
    .hero-tagline {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 24;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 1.55vw, 1.5rem);
      line-height: 1.35;
      color: var(--ink-soft);
      max-width: 30ch;
    }

    .hero-scroll {
      justify-self: center;
      display: inline-flex; flex-direction: column; align-items: center; gap: .55rem;
      font-size: .55rem; letter-spacing: .38em; text-transform: uppercase;
      color: var(--ink-mute); font-weight: 500;
    }
    .hero-scroll .line {
      display: block;
      width: 1px; height: 22px;
      background: var(--ink-mute);
      transform-origin: top center;
      animation: scrollpulse 3.5s ease-in-out infinite;
    }
    @keyframes scrollpulse {
      0%, 100% { transform: scaleY(.5); opacity: .5; }
      50%      { transform: scaleY(1);  opacity: 1; }
    }

    @media (max-width: 720px) {
      .hero-content { padding: 2rem 1.5rem 1.4rem; }
      .hero-content::before { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-scroll .line { animation: none; opacity: .6; }
      html { scroll-behavior: auto; }
      /* Reduced motion: static SVG poster is the entire display. */
      #hero-canvas { display: none; }
      .hero-svg { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-stage">
        <svg class="hero-svg" id="hero-svg" viewBox="-3.4 -3.4 6.8 6.8" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <canvas id="hero-canvas" aria-hidden="true"></canvas>
      </div>
      <div class="hero-content">
        <div class="hero-eyebrow"><span>Melomaniac Studios · Toronto</span></div>
        <div class="hero-main">
          <h1 class="hero-wordmark">
            <span class="w-a">Melomaniac</span>
            <span class="w-b">Studios</span>
          </h1>
          <p class="hero-tagline">A house for sound.</p>
        </div>
        <div class="hero-scroll">
          <span>Scroll</span>
          <span class="line" aria-hidden="true"></span>
        </div>
      </div>
    </section>
  </main>

  <!--
    Static SVG poster.
    Matches the NEW composition — a green particle scatter shaped by the same
    seeded wave field (frozen at t=0) plus faint concentric hairlines. No stars.
    So on load: SVG shows the frozen field → WebGL first frame renders (canvas
    still opacity 0) → crossfade brings the same composition to life. No jump.

    Also the display for prefers-reduced-motion.
  -->
  <script>
  (function buildStaticPoster(){
    const svg = document.getElementById('hero-svg');
    if (!svg) return;

    // Same seed generator + emitter draws as the WebGL side, so both share the
    // same "wave field snapshot" identity per load.
    const now = new Date();
    const seed = (
      (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
      + now.getHours() * 60 + now.getMinutes()
    ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
    let s = seed >>> 0;
    const rng = () => {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const rand = (a, b) => a + rng() * (b - a);

    const INK       = 'rgba(20,19,16,.55)';
    const INK_FAINT = 'rgba(20,19,16,.20)';
    const GREEN     = '#B8F06E';

    // Same emitter seeding order as the WebGL initHero — snapshot at t=0.
    const emitters = [];
    for (let i = 0; i < 3; i++) {
      emitters.push({
        x: rand(-1.8, 1.8),
        y: rand(-1.2, 1.2),
        z: rand(-0.6, 0.6),   // consumed to keep the seed stream aligned; ignored below
        omega: rand(1.6, 3.0),
        amp:   rand(0.75, 1.15),
        phase: rand(0, Math.PI * 2),
      });
    }
    // 2D scalar-field snapshot (drop z for the poster — poster is a plane).
    function scalarField(x, y) {
      let f = 0;
      for (const e of emitters) {
        const dx = x - e.x, dy = y - e.y;
        const r = Math.hypot(dx, dy);
        const k = e.omega * 0.75;
        f += e.amp * Math.sin(k * r + e.phase) / (1 + r * 0.35);
      }
      return f;
    }

    // Green particle scatter, biased by field magnitude — nodes stay dim, peaks bright.
    const scatter = [];
    const N = 1200;
    for (let i = 0; i < N; i++) {
      let x, y;
      do { x = rand(-3.05, 3.05); y = rand(-3.05, 3.05); }
      while (x*x + y*y > 8.7);  // r ≤ ~2.95
      const field = scalarField(x, y);
      const mag = Math.min(Math.abs(field), 1.4);
      const gate = Math.max(0, (mag - 0.05) / 0.5);
      const alpha = 0.15 + 0.78 * Math.min(1, gate);
      const r = rand(0.011, 0.022);
      const isInk = rng() < 0.08;
      const color = isInk ? INK : GREEN;
      scatter.push(
        `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r.toFixed(3)}" fill="${color}" fill-opacity="${alpha.toFixed(2)}"/>`
      );
    }

    svg.innerHTML = [
      // Field (the star of the poster)
      `<g>${scatter.join('')}</g>`,
      // Architecture whisper: three faint hairline circles
      `<circle cx="0" cy="0" r="2.85" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="2.05" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="1.35" fill="none" stroke="${INK_FAINT}" stroke-width=".009"/>`,
    ].join('');
  })();
  </script>

  <!--
    WebGL piece. Vendored ES module — no third-party CDN at runtime.
    On failure the SVG poster above stays.

    Principle: one shared wave field. Three seeded spherical emitters + mouse-
    as-emitter + optional Chladni standing wave. Particles read the vector
    field for displacement and the scalar field for brightness/size. The
    hairline circles read the same field and gently deform in JS with the
    same equation, so nothing moves to a private clock.
  -->
  <script type="module">
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      // Poster is the display; do not spin up rAF.
    } else {
      try {
        const THREE = await import('./vendor/three.module.min.js');
        initHero(THREE);
      } catch (err) {
        console.warn('[hero] WebGL module unavailable — poster fallback in use.', err);
      }
    }

    function initHero(THREE) {
      const canvas = document.getElementById('hero-canvas');
      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      } catch (e) {
        console.warn('[hero] WebGL unavailable — poster fallback in use.', e);
        return;
      }

      const INK   = 0x141310;
      const GREEN = 0xB8F06E;
      const PAPER = 0xF5F3EC;
      const SPEED = 0.80;  // single tempo knob for the whole piece

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setClearColor(PAPER, 1);
      const pixelRatio = renderer.getPixelRatio();

      // ---- seeded RNG (mulberry32) ----
      const now = new Date();
      const seed = (
        (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
        + now.getHours() * 60 + now.getMinutes()
      ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
      let s = seed >>> 0;
      const rng = () => {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
      const rand = (a, b) => a + rng() * (b - a);

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.z = 8;

      const assembly = new THREE.Group();
      scene.add(assembly);

      // ============================================================
      // SHARED WAVE FIELD
      //   Three stationary emitters (seeded per load).
      //   Each contributes a spherical wave: u_i = A_i · sin(k·r − ω·t + φ) / (1 + α·r)
      //   Superposition is linear → real interference (peaks add, opposite phases cancel).
      //   c = ω / k = 1 / 0.75 ≈ 1.33 (units per second in slow-time T).
      // ============================================================
      const emitters = [];
      for (let i = 0; i < 3; i++) {
        emitters.push({
          pos:   new THREE.Vector3(rand(-1.8, 1.8), rand(-1.2, 1.2), rand(-0.6, 0.6)),
          omega: rand(1.6, 3.0),
          amp:   rand(0.75, 1.15),
          phase: rand(0, Math.PI * 2),
        });
      }

      // Chladni standing wave — nodal pattern that quietly rises and recedes.
      const chladniKx = rand(1.4, 2.8);
      const chladniKy = rand(1.4, 2.8);

      // Mouse-as-emitter — persistent 4th source whose amplitude is fed by cursor
      // motion and decays when idle. Phase reference shared with the base emitters,
      // so it INTERFERES with them cleanly (not just sits on top).
      const mouseLocal = new THREE.Vector3(999, 999, 999);
      let mouseAmp = 0.0;
      const mouseFreq = rand(2.2, 3.4);

      // ============================================================
      // FLUID PARTICLES — the star of the piece.
      //   Reads the same wave field. Displaces along vector field,
      //   brightness/size along |scalar field|.
      //   Print-dot scale, mostly green, ink minority for depth.
      // ============================================================
      function chooseCount(w) {
        if (w >= 1400) return 7000;
        if (w >= 1000) return 5000;
        if (w >= 640)  return 3000;
        return 1800;
      }
      const N = chooseCount(window.innerWidth);

      const pos    = new Float32Array(N * 3);
      const col    = new Float32Array(N * 3);
      const sizeA  = new Float32Array(N);
      const alphaA = new Float32Array(N);
      const gr = new THREE.Color(GREEN);
      const inkC = new THREE.Color(INK);

      for (let i = 0; i < N; i++) {
        // Uniform in a disc (sqrt-sampled radius → no clumping at center), slight z spread.
        const r  = Math.sqrt(rng()) * 3.05;
        const th = rng() * Math.PI * 2;
        pos[i*3]   = Math.cos(th) * r;
        pos[i*3+1] = Math.sin(th) * r;
        pos[i*3+2] = (rng() - 0.5) * 0.9;
        sizeA[i]  = rand(0.55, 1.1);
        alphaA[i] = rand(0.45, 0.95);
        // ~92% green, ~8% ink
        const isInk = rng() < 0.08;
        const c = isInk ? inkC : gr;
        col[i*3]   = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
      }

      const fluidGeom = new THREE.BufferGeometry();
      fluidGeom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      fluidGeom.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
      fluidGeom.setAttribute('aSize',    new THREE.BufferAttribute(sizeA, 1));
      fluidGeom.setAttribute('aAlpha',   new THREE.BufferAttribute(alphaA, 1));

      const FLUID_VS = /* glsl */`
        precision highp float;
        uniform float uTime;
        uniform float uPixelRatio;
        uniform float uSizeBase;

        // Emitter uniforms — three vec3 positions + packed (omega, amp, phase) triples.
        uniform vec3  uE0Pos;  uniform vec3  uE1Pos;  uniform vec3  uE2Pos;
        uniform vec3  uEOmegas;  // (omega0, omega1, omega2)
        uniform vec3  uEAmps;    // (amp0,   amp1,   amp2)
        uniform vec3  uEPhases;  // (phase0, phase1, phase2)

        // Mouse-as-emitter
        uniform vec3  uMousePos;
        uniform float uMouseAmp;
        uniform float uMouseFreq;

        // Standing wave
        uniform vec2  uChladniK;
        uniform float uChladniAmp;

        attribute vec3  aColor;
        attribute float aSize;
        attribute float aAlpha;

        varying vec3  vColor;
        varying float vAlpha;

        // Spherical wave contribution.
        // Returns .xyz = vector displacement (dir·u), .w = scalar amplitude u.
        //   u = A · sin(k·r − ω·t + φ) / (1 + α·r)
        vec4 wave(vec3 p, vec3 e, float omega, float amp, float phase, float t) {
          vec3 d = p - e;
          float r = length(d);
          vec3 dir = d / max(r, 0.001);
          float k = omega * 0.75;
          float u = amp * sin(k * r - omega * t + phase) / (1.0 + r * 0.35);
          return vec4(dir * u, u);
        }

        void main() {
          vec3 basePos = position;
          vec3  vecField    = vec3(0.0);
          float scalarField = 0.0;

          // Three stationary emitters — superposition is real interference.
          vec4 w0 = wave(basePos, uE0Pos, uEOmegas.x, uEAmps.x, uEPhases.x, uTime);
          vec4 w1 = wave(basePos, uE1Pos, uEOmegas.y, uEAmps.y, uEPhases.y, uTime);
          vec4 w2 = wave(basePos, uE2Pos, uEOmegas.z, uEAmps.z, uEPhases.z, uTime);
          vecField    += w0.xyz + w1.xyz + w2.xyz;
          scalarField += w0.w   + w1.w   + w2.w;

          // Cursor emitter — same time reference so it INTERFERES with the base field.
          if (uMouseAmp > 0.001) {
            vec4 wm = wave(basePos, uMousePos, uMouseFreq, uMouseAmp, 0.0, uTime);
            vecField    += wm.xyz;
            scalarField += wm.w;
          }

          // 2-D Chladni standing wave — nodal grid where sin·sin = 0.
          float chladni = uChladniAmp * sin(uChladniK.x * basePos.x) * sin(uChladniK.y * basePos.y);
          scalarField += chladni;
          vecField.z  += chladni * 0.35;

          // Displace along the vector field. Magnitude tuned so interference is visible
          // as bands of motion, but particles don't fling out of frame.
          vec3 displaced = basePos + vecField * 0.36;

          vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
          gl_Position = projectionMatrix * mvPosition;

          // Brightness/size from |scalar field| → wavefronts and interference bands
          // read as bright and dim regions moving through the cloud.
          float mag  = min(abs(scalarField), 1.4);
          float gate = smoothstep(0.05, 0.55, mag);
          float szm  = 0.55 + 0.85 * gate;

          // Print-dot scale — much smaller than the previous pass.
          gl_PointSize = uSizeBase * aSize * szm * uPixelRatio * (22.0 / max(-mvPosition.z, 0.1));

          vColor = aColor;
          vAlpha = aAlpha * (0.16 + 0.86 * gate);
        }
      `;

      const FLUID_FS = /* glsl */`
        precision mediump float;
        varying vec3  vColor;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d2 = dot(uv, uv);
          // Sharp print-like disc, no glow.
          float a = smoothstep(0.24, 0.19, d2);
          if (a <= 0.001) discard;
          gl_FragColor = vec4(vColor, a * vAlpha);
        }
      `;

      const fluidMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime:       { value: 0 },
          uPixelRatio: { value: pixelRatio },
          uSizeBase:   { value: 1.0 },
          uE0Pos:      { value: emitters[0].pos },
          uE1Pos:      { value: emitters[1].pos },
          uE2Pos:      { value: emitters[2].pos },
          uEOmegas:    { value: new THREE.Vector3(emitters[0].omega, emitters[1].omega, emitters[2].omega) },
          uEAmps:      { value: new THREE.Vector3(emitters[0].amp,   emitters[1].amp,   emitters[2].amp) },
          uEPhases:    { value: new THREE.Vector3(emitters[0].phase, emitters[1].phase, emitters[2].phase) },
          uMousePos:   { value: mouseLocal },
          uMouseAmp:   { value: 0 },
          uMouseFreq:  { value: mouseFreq },
          uChladniK:   { value: new THREE.Vector2(chladniKx, chladniKy) },
          uChladniAmp: { value: 0 },
        },
        vertexShader: FLUID_VS,
        fragmentShader: FLUID_FS,
        transparent: true,
        depthWrite: false,
        depthTest:  true,
        blending:   THREE.NormalBlending,   // NEVER additive on ivory
      });

      const fluid = new THREE.Points(fluidGeom, fluidMat);
      assembly.add(fluid);

      // ============================================================
      // ARCHITECTURE WHISPER — three faint hairline circles.
      //   Same wave field: JS mirrors the shader math so lines and particles
      //   move to the SAME music.
      // ============================================================
      function makeCircle(radiusBase, colorHex, opacity, z, segments=128) {
        const positions = new Float32Array(segments * 3);
        for (let i = 0; i < segments; i++) {
          const t = (i / segments) * Math.PI * 2;
          positions[i*3]   = Math.cos(t) * radiusBase;
          positions[i*3+1] = Math.sin(t) * radiusBase;
          positions[i*3+2] = z;
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const line = new THREE.LineLoop(geom, new THREE.LineBasicMaterial({
          color: colorHex, transparent: true, opacity, depthWrite: false,
        }));
        line.userData = { basePositions: positions.slice() };
        return line;
      }

      const circles = [
        makeCircle(2.85, INK, 0.15, -0.12),
        makeCircle(2.05, INK, 0.17,  0.02),
        makeCircle(1.35, INK, 0.22,  0.14),
      ];
      circles.forEach(c => assembly.add(c));

      // Mirror of the shader's scalar field, in JS, so circle deform stays coherent.
      function scalarFieldJS(bx, by, bz, T) {
        let f = 0;
        for (let j = 0; j < 3; j++) {
          const e = emitters[j];
          const dx = bx - e.pos.x, dy = by - e.pos.y, dz = bz - e.pos.z;
          const r  = Math.sqrt(dx*dx + dy*dy + dz*dz);
          const k  = e.omega * 0.75;
          f += e.amp * Math.sin(k * r - e.omega * T + e.phase) / (1 + r * 0.35);
        }
        if (mouseAmp > 0.001) {
          const dx = bx - mouseLocal.x, dy = by - mouseLocal.y, dz = bz - mouseLocal.z;
          const r  = Math.sqrt(dx*dx + dy*dy + dz*dz);
          const k  = mouseFreq * 0.75;
          f += mouseAmp * Math.sin(k * r - mouseFreq * T) / (1 + r * 0.35);
        }
        const chAmp = fluidMat.uniforms.uChladniAmp.value;
        f += chAmp * Math.sin(chladniKx * bx) * Math.sin(chladniKy * by);
        return f;
      }

      function deformCircles(T) {
        for (const c of circles) {
          const posAttr = c.geometry.attributes.position;
          const base = c.userData.basePositions;
          const M = posAttr.count;
          const arr = posAttr.array;
          for (let i = 0; i < M; i++) {
            const bx = base[i*3];
            const by = base[i*3+1];
            const bz = base[i*3+2];
            const f = scalarFieldJS(bx, by, bz, T);
            const dispR = f * 0.07;   // subtle radial breathe
            const n2 = bx*bx + by*by;
            if (n2 > 1e-4) {
              const inv = 1 / Math.sqrt(n2);
              arr[i*3]   = bx + bx * inv * dispR;
              arr[i*3+1] = by + by * inv * dispR;
            } else {
              arr[i*3]   = bx;
              arr[i*3+1] = by;
            }
            arr[i*3+2] = bz + f * 0.022;
          }
          posAttr.needsUpdate = true;
        }
      }

      // Sculptural base tilt + per-load starting angle
      const baseTiltX = 0.28;
      assembly.rotation.x = baseTiltX;
      assembly.rotation.z = rng() * Math.PI * 2;

      function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h, false);
        const aspect = w / h;
        camera.aspect = aspect;
        camera.position.z = aspect >= 1.15 ? 8 : (aspect >= 0.85 ? 9.2 : (8 / Math.max(aspect, 0.42)));
        camera.updateProjectionMatrix();
        const isWide = aspect >= 1.4;
        const isMed  = aspect >= 0.95;
        assembly.position.x = isWide ? 1.2 : (isMed ? 0.5 : 0);
        assembly.scale.setScalar(isWide ? 1.0 : (isMed ? 0.9 : 0.82));
        fluidMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
      resize();
      window.addEventListener('resize', resize);

      // ============================================================
      // MOUSE = EMITTER (not magnet)
      //   Cursor position → world plane at z=0 → assembly-local space.
      //   Amplitude is fed by motion, decays when idle. No assembly rotation
      //   response; interaction lives inside the physics, not on the transform.
      // ============================================================
      const raycaster = new THREE.Raycaster();
      const mouseNDC  = new THREE.Vector2();
      const _tmpWorld = new THREE.Vector3();
      const _plane    = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

      let pendingPointer = null;
      window.addEventListener('pointermove', (e) => {
        pendingPointer = { x: e.clientX, y: e.clientY };
      }, { passive: true });
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length) {
          pendingPointer = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }, { passive: true });

      function pumpPointer() {
        if (!pendingPointer) return;
        mouseNDC.x =  (pendingPointer.x / window.innerWidth)  * 2 - 1;
        mouseNDC.y = -(pendingPointer.y / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouseNDC, camera);
        if (raycaster.ray.intersectPlane(_plane, _tmpWorld)) {
          const clone = _tmpWorld.clone();
          assembly.worldToLocal(clone);
          mouseLocal.copy(clone);
          fluidMat.uniforms.uMousePos.value.copy(mouseLocal);
          // Fresh motion → hold amplitude at 1. Idle → let it decay in tick().
          mouseAmp = 1.0;
        }
        pendingPointer = null;
      }

      // ============================================================
      // TICK
      // ============================================================
      const clock = new THREE.Clock();
      let ready = false;

      function tick() {
        const t = clock.getElapsedTime();
        const T = t * SPEED;

        // 1. Update assembly transform first so worldToLocal in pumpPointer uses the current frame.
        const driftY = Math.sin(T * 0.075) * 0.22;
        const driftX = Math.sin(T * 0.11)  * 0.05;
        assembly.rotation.y = driftY;
        assembly.rotation.x = baseTiltX + driftX;
        assembly.updateMatrixWorld(true);

        // 2. Absorb pending cursor motion → mouse emitter local pos + amplitude bump.
        pumpPointer();

        // 3. Amplitude decay (frame-rate assumed ≈ 60 → ~2s to fade). If it's uneven,
        //    the physics still works; just the fade timing wobbles.
        mouseAmp *= 0.985;
        if (mouseAmp < 0.001) mouseAmp = 0;
        fluidMat.uniforms.uMouseAmp.value = mouseAmp;

        // 4. Standing-wave amplitude: very slow rise and recede over ~180 s so
        //    nodal patterns emerge and dissolve, never stuck.
        fluidMat.uniforms.uChladniAmp.value = 0.20 * (0.5 + 0.5 * Math.sin(T * 0.035));

        // 5. Fluid time uniform — drives the whole wave field.
        fluidMat.uniforms.uTime.value = T;

        // 6. Circles: sample the same field and deform.
        deformCircles(T);

        // 7. Render. First frame = still opacity 0 on canvas → then trigger crossfade.
        renderer.render(scene, camera);

        if (!ready) {
          ready = true;
          // Double-rAF: guarantees the first frame is presented before the CSS
          // transition kicks in, so the crossfade shows animation, not a pop.
          requestAnimationFrame(() =>
            requestAnimationFrame(() => document.body.classList.add('webgl-ready'))
          );
        }
        requestAnimationFrame(tick);
      }
      tick();
    }
  </script>
</body>
</html>
