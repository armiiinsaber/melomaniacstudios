<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Melomaniac Studios — A house for sound</title>
  <meta name="description" content="Melomaniac Studios — a house for sound. Toronto.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #B8F06E;
      --green-ink: #24350D;
      --paper: #F5F3EC;
      --paper-deep: #ECE9DF;
      --ink: #141310;
      --ink-soft: rgba(20,19,16,.55);
      --ink-mute: rgba(20,19,16,.34);
      --hairline: rgba(20,19,16,.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: var(--green); color: var(--ink); }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { text-wrap: balance; }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background: var(--paper);
    }
    .hero-stage {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .hero-svg, #hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .hero-svg {
      opacity: 1;
      transition: opacity .9s ease .15s;
    }
    #hero-canvas {
      opacity: 0;
      transition: opacity .9s ease;
    }
    body.webgl-ready .hero-svg { opacity: 0; }
    body.webgl-ready #hero-canvas { opacity: 1; }

    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      min-height: 100svh;
      padding: 2.4rem clamp(1.5rem, 4vw, 3.5rem) 1.8rem;
      pointer-events: none;
    }
    .hero-content > * { pointer-events: auto; }

    .hero-content::before {
      content: '';
      position: absolute;
      left: -6%;
      top: 18%;
      width: 78%;
      height: 62%;
      background: radial-gradient(ellipse at 32% 50%, rgba(245,243,236,.62) 0%, rgba(245,243,236,0) 62%);
      pointer-events: none;
      z-index: -1;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .85rem;
      font-size: .68rem; letter-spacing: .34em; text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      align-self: start; justify-self: start;
    }
    .hero-eyebrow::before {
      content: ''; width: 30px; height: 1px; background: var(--ink);
    }

    .hero-main {
      align-self: center;
      max-width: min(60ch, 100%);
      display: flex; flex-direction: column;
      gap: 1.4rem;
    }
    .hero-wordmark {
      font-family: 'Fraunces', 'Instrument Serif', Georgia, serif;
      font-variation-settings: 'opsz' 144;
      font-weight: 300;
      font-size: clamp(4.2rem, 13.4vw, 12.8rem);
      line-height: .86;
      letter-spacing: -.028em;
      color: var(--ink);
      display: flex; flex-direction: column;
    }
    .hero-wordmark .w-a { display: block; }
    .hero-wordmark .w-b {
      display: block;
      font-style: italic;
      font-weight: 300;
      padding-left: .06em;
      margin-top: -.015em;
    }
    .hero-tagline {
      font-family: 'Fraunces', serif;
      font-variation-settings: 'opsz' 24;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 1.55vw, 1.5rem);
      line-height: 1.35;
      color: var(--ink-soft);
      max-width: 30ch;
    }

    .hero-scroll {
      justify-self: center;
      display: inline-flex; flex-direction: column; align-items: center; gap: .55rem;
      font-size: .55rem; letter-spacing: .38em; text-transform: uppercase;
      color: var(--ink-mute); font-weight: 500;
    }
    .hero-scroll .line {
      display: block;
      width: 1px; height: 22px;
      background: var(--ink-mute);
      transform-origin: top center;
      /* 20 % slower than the earlier 2.8s — matches the SPEED = 0.8 tempo of the piece. */
      animation: scrollpulse 3.5s ease-in-out infinite;
    }
    @keyframes scrollpulse {
      0%, 100% { transform: scaleY(.5); opacity: .5; }
      50%      { transform: scaleY(1);  opacity: 1; }
    }

    @media (max-width: 720px) {
      .hero-content { padding: 2rem 1.5rem 1.4rem; }
      .hero-content::before { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-scroll .line { animation: none; opacity: .6; }
      html { scroll-behavior: auto; }
      /* Reduced motion: static SVG poster is the entire display. Never light up the canvas. */
      #hero-canvas { display: none; }
      .hero-svg { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-stage">
        <svg class="hero-svg" id="hero-svg" viewBox="-3.4 -3.4 6.8 6.8" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <canvas id="hero-canvas" aria-hidden="true"></canvas>
      </div>
      <div class="hero-content">
        <div class="hero-eyebrow"><span>Melomaniac Studios · Toronto</span></div>
        <div class="hero-main">
          <h1 class="hero-wordmark">
            <span class="w-a">Melomaniac</span>
            <span class="w-b">Studios</span>
          </h1>
          <p class="hero-tagline">A house for sound.</p>
        </div>
        <div class="hero-scroll">
          <span>Scroll</span>
          <span class="line" aria-hidden="true"></span>
        </div>
      </div>
    </section>
  </main>

  <!--
    Static SVG poster.
    Runs synchronously, so the composition is on paper before the WebGL module has
    resolved. Also serves as: (a) fallback if the module fails to load / WebGL is
    unavailable, (b) poster frame for prefers-reduced-motion (fluid frozen as a
    static particle scatter, geometry as thin lines — same visual DNA).
  -->
  <script>
  (function buildStaticPoster(){
    const svg = document.getElementById('hero-svg');
    if (!svg) return;

    // Seed the poster with the same date/hour/minute source the WebGL piece uses,
    // so a refresh reshuffles both together — the SVG scatter and the fluid share
    // a direction/density feel during the brief cross-fade.
    const now = new Date();
    const seed = (
      (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
      + now.getHours() * 60 + now.getMinutes()
    ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
    let s = seed >>> 0;
    const rng = () => {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
    const rand = (a, b) => a + rng() * (b - a);

    // Star polygon path {n/step}: connect vertex 0 → step → 2*step → … all mod n.
    // gcd(n, step)=1 → single continuous closed line hitting every vertex.
    function starPath(n, r, step) {
      let idx = 0, d = '';
      for (let k = 0; k < n; k++) {
        const a = (idx / n) * Math.PI * 2;
        const x = (Math.cos(a) * r).toFixed(3);
        const y = (Math.sin(a) * r).toFixed(3);
        d += (k === 0 ? 'M' : 'L') + x + ',' + y + ' ';
        idx = (idx + step) % n;
      }
      return d + 'Z';
    }

    const INK       = 'rgba(20,19,16,.60)';
    const INK_MED   = 'rgba(20,19,16,.42)';
    const INK_FAINT = 'rgba(20,19,16,.22)';
    const GREEN     = '#B8F06E';

    // Spokes
    const spokes = (n, r0, r1, opacity) => {
      let d = '';
      for (let i = 0; i < n; i++) {
        const a = (i / n) * Math.PI * 2;
        d += `M${(Math.cos(a)*r0).toFixed(3)},${(Math.sin(a)*r0).toFixed(3)} L${(Math.cos(a)*r1).toFixed(3)},${(Math.sin(a)*r1).toFixed(3)} `;
      }
      return `<path d="${d}" fill="none" stroke="${INK}" stroke-opacity="${opacity}" stroke-width=".009"/>`;
    };

    // Fluid poster scatter — a seeded prolate cloud of green dots, minority ink,
    // stretched along a random 2D "flow" direction. Reads as the WebGL fluid stopped
    // in place. Rendered UNDER the ink line-work so the geometry still reads clearly.
    const flowAngle = rand(-Math.PI * 0.35, Math.PI * 0.35);
    const flowX = Math.cos(flowAngle), flowY = Math.sin(flowAngle);
    const perpX = -flowY, perpY = flowX;
    const N_SCATTER = 240;
    let scatter = '';
    for (let i = 0; i < N_SCATTER; i++) {
      const along  = (rng() - 0.5) * 5.4;
      const across = (Math.sqrt(rng()) * (rng() < .5 ? -1 : 1)) * 1.6;
      const x = flowX * along + perpX * across;
      const y = flowY * along + perpY * across;
      if (Math.hypot(x, y) > 3.2) continue; // trim to viewBox
      const r = rand(0.018, 0.035);
      const isInk = rng() < 0.15;
      const color = isInk ? INK_MED : GREEN;
      const alpha = rand(0.28, 0.72);
      scatter += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r.toFixed(3)}" fill="${color}" fill-opacity="${alpha.toFixed(2)}"/>`;
    }

    svg.innerHTML = [
      // fluid first (behind), so ink geometry reads on top
      `<g>${scatter}</g>`,
      // architecture (thin ink line-work)
      `<circle cx="0" cy="0" r="2.85" fill="none" stroke="${INK_FAINT}" stroke-width=".008"/>`,
      `<circle cx="0" cy="0" r="1.35" fill="none" stroke="${INK_FAINT}" stroke-width=".009"/>`,
      spokes(24, 1.3, 2.6, .55),
      `<path d="${starPath(12, 2.6,  5)}" fill="none" stroke="${INK}"     stroke-width=".011" stroke-linejoin="round"/>`,
      `<path d="${starPath(10, 1.72, 3)}" fill="none" stroke="${INK}"     stroke-width=".011" stroke-linejoin="round"/>`,
      `<path d="${starPath(12, 1.35, 5)}" fill="none" stroke="${INK_MED}" stroke-width=".010" stroke-linejoin="round"/>`,
      `<path d="${starPath(8,  0.6,  3)}" fill="none" stroke="${INK}"     stroke-width=".010" stroke-linejoin="round"/>`,
      // rationed continuous green {12/5}
      `<path d="${starPath(12, 2.15, 5)}" fill="none" stroke="${GREEN}"   stroke-width=".018" stroke-linejoin="round" stroke-linecap="round"/>`,
      `<circle cx="0" cy="0" r="0.13" fill="${INK}"/>`,
    ].join('');
  })();
  </script>

  <!--
    WebGL piece. Vendored ES module — no third-party CDN at runtime.
    If the import fails or WebGL init throws, the SVG poster above stays visible.
  -->
  <script type="module">
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      // nothing to do — SVG poster is the display
    } else {
      try {
        const THREE = await import('./vendor/three.module.min.js');
        initHero(THREE);
      } catch (err) {
        console.warn('[hero] WebGL module unavailable — poster fallback in use.', err);
      }
    }

    function initHero(THREE) {
      const canvas = document.getElementById('hero-canvas');

      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      } catch (e) {
        console.warn('[hero] WebGL unavailable — poster fallback in use.', e);
        return;
      }

      const INK   = 0x141310;
      const GREEN = 0xB8F06E;
      const PAPER = 0xF5F3EC;

      // Single global tempo. Everything time-scaled goes through SPEED so the
      // piece stays internally proportional at any tuning.
      const SPEED = 0.80;

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setClearColor(PAPER, 1);
      const pixelRatio = renderer.getPixelRatio();

      // Seeded RNG (mulberry32). Seed shifts with date + hour + minute + a 10-second
      // bucket so the piece is "never the same twice" across a day.
      const now = new Date();
      const seed = (
        (now.getFullYear() * 366 + now.getMonth() * 31 + now.getDate()) * 1440
        + now.getHours() * 60 + now.getMinutes()
      ) ^ (Math.floor(now.getSeconds() / 10) * 2654435761);
      let s = seed >>> 0;
      const rng = () => {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
      const pick = (arr) => arr[Math.floor(rng() * arr.length)];
      const rand = (a, b) => a + rng() * (b - a);

      const FOLDS = [8, 10, 12, 16];
      const primary = pick(FOLDS);

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.z = 8;

      const assembly = new THREE.Group();
      scene.add(assembly);

      // ---------- Line-builders ----------
      function segs(positions, color, opacity) {
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        return new THREE.LineSegments(geom, new THREE.LineBasicMaterial({ color, transparent: true, opacity }));
      }
      function loop(positions, color, opacity) {
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        return new THREE.Line(geom, new THREE.LineBasicMaterial({ color, transparent: true, opacity }));
      }
      function starChords(n, radius, step, color, opacity, z=0) {
        const verts = [];
        for (let i = 0; i < n; i++) {
          const t = (i / n) * Math.PI * 2;
          verts.push([Math.cos(t) * radius, Math.sin(t) * radius, z]);
        }
        const pos = [];
        for (let i = 0; i < n; i++) {
          const j = (i + step) % n;
          pos.push(...verts[i], ...verts[j]);
        }
        return segs(pos, color, opacity);
      }
      // Star polygon drawn as ONE continuous closed line (LineLoop). Coprime (n, step) → one stroke.
      function starOneLine(n, radius, step, color, opacity, z=0) {
        const pos = [];
        for (let k = 0; k < n; k++) {
          const idx = (k * step) % n;
          const t = (idx / n) * Math.PI * 2;
          pos.push(Math.cos(t) * radius, Math.sin(t) * radius, z);
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        return new THREE.LineLoop(geom, new THREE.LineBasicMaterial({ color, transparent: true, opacity }));
      }
      function circleLine(radius, color, opacity, z=0, segments=192) {
        const pos = [];
        for (let i = 0; i <= segments; i++) {
          const t = (i / segments) * Math.PI * 2;
          pos.push(Math.cos(t) * radius, Math.sin(t) * radius, z);
        }
        return loop(pos, color, opacity);
      }
      function radials(n, r0, r1, color, opacity, z=0, phase=0) {
        const pos = [];
        for (let i = 0; i < n; i++) {
          const t = (i / n) * Math.PI * 2 + phase;
          pos.push(Math.cos(t)*r0, Math.sin(t)*r0, z, Math.cos(t)*r1, Math.sin(t)*r1, z);
        }
        return segs(pos, color, opacity);
      }
      function girihBand(n, rInner, rOuter, stepA, stepB, color, opacity, z) {
        const g = new THREE.Group();
        g.add(starChords(n, rInner, stepA, color, opacity, z));
        g.add(starChords(n, rOuter, stepB, color, opacity * 0.72, z));
        return g;
      }

      // ---------- Fluid particle field (GPU, curl-noise + traveling wave) ----------
      // "The sound moving through the house." Green-primary, minority ink, normal
      // alpha blending (no additive → no wash on ivory), sharp print-like dots.
      // Positioned in the assembly so it inherits the same tilt/offset as the
      // architecture, but with a slight rotation of its own so it visibly crosses
      // through the rosette plane.

      // Count scales with viewport; on chug, drop this before anything else.
      function chooseFluidCount(w) {
        if (w >= 1400) return 3200;
        if (w >= 1000) return 2400;
        if (w >= 640)  return 1500;
        return 900;
      }
      const FLUID_N = chooseFluidCount(window.innerWidth);

      const flowDir = new THREE.Vector3(rand(-1, 1), rand(-0.35, 0.35), rand(-1, 1)).normalize();
      // Orthonormal basis with flowDir
      const up = Math.abs(flowDir.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
      const perp1 = new THREE.Vector3().crossVectors(flowDir, up).normalize();
      const perp2 = new THREE.Vector3().crossVectors(flowDir, perp1).normalize();

      const fluidPos   = new Float32Array(FLUID_N * 3);
      const fluidColor = new Float32Array(FLUID_N * 3);
      const fluidSize  = new Float32Array(FLUID_N);
      const fluidAlpha = new Float32Array(FLUID_N);
      const inkC = new THREE.Color(INK);
      const grC  = new THREE.Color(GREEN);

      for (let i = 0; i < FLUID_N; i++) {
        // Prolate cloud, stretched along flowDir. Radius across is sqrt-sampled so
        // density is uniform across the disc — no clumping at the axis.
        const along  = (rng() - 0.5) * 5.6;
        const acrossR = Math.sqrt(rng()) * 1.55;
        const acrossA = rng() * Math.PI * 2;
        const p = new THREE.Vector3()
          .addScaledVector(flowDir, along)
          .addScaledVector(perp1, Math.cos(acrossA) * acrossR)
          .addScaledVector(perp2, Math.sin(acrossA) * acrossR);
        fluidPos[i*3]   = p.x;
        fluidPos[i*3+1] = p.y;
        fluidPos[i*3+2] = p.z;

        fluidSize[i]  = rand(0.7, 1.9);
        fluidAlpha[i] = rand(0.32, 0.85);

        // ~85% green, ~15% ink weight
        const isInk = rng() < 0.15;
        const c = isInk ? inkC : grC;
        fluidColor[i*3]   = c.r;
        fluidColor[i*3+1] = c.g;
        fluidColor[i*3+2] = c.b;
      }

      const fluidGeom = new THREE.BufferGeometry();
      fluidGeom.setAttribute('position', new THREE.BufferAttribute(fluidPos, 3));
      fluidGeom.setAttribute('aColor',   new THREE.BufferAttribute(fluidColor, 3));
      fluidGeom.setAttribute('aSize',    new THREE.BufferAttribute(fluidSize, 1));
      fluidGeom.setAttribute('aAlpha',   new THREE.BufferAttribute(fluidAlpha, 1));

      // Seeded wave params (already scaled to SPEED-friendly ranges)
      const waveDir   = new THREE.Vector3(rand(-1, 1), rand(-0.6, 0.6), rand(-1, 1)).normalize();
      const waveFreq  = rand(1.4, 2.6);
      const waveSpeed = rand(0.12, 0.22);
      const flowAmp   = rand(0.28, 0.42);
      const flowTimeScale = rand(0.035, 0.055);

      const FLUID_VS = /* glsl */`
        uniform float uTime;
        uniform float uPixelRatio;
        uniform vec3  uWaveDir;
        uniform float uWaveFreq;
        uniform float uWaveSpeed;
        uniform float uAmp;
        uniform float uFlowTime;
        uniform float uSizeBase;

        attribute vec3  aColor;
        attribute float aSize;
        attribute float aAlpha;

        varying vec3  vColor;
        varying float vAlpha;

        // Simplex 3D noise — Ashima
        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
        float snoise(vec3 v) {
          const vec2  C = vec2(1.0/6.0, 1.0/3.0);
          const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
          vec3 i  = floor(v + dot(v, C.yyy));
          vec3 x0 = v - i + dot(i, C.xxx);
          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min(g.xyz, l.zxy);
          vec3 i2 = max(g.xyz, l.zxy);
          vec3 x1 = x0 - i1 + 1.0 * C.xxx;
          vec3 x2 = x0 - i2 + 2.0 * C.xxx;
          vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
          i = mod(i, 289.0);
          vec4 p = permute(permute(permute(
                     i.z + vec4(0.0, i1.z, i2.z, 1.0))
                   + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                   + i.x + vec4(0.0, i1.x, i2.x, 1.0));
          float n_ = 1.0/7.0;
          vec3 ns = n_ * D.wyz - D.xzx;
          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_);
          vec4 x = x_ * ns.x + ns.yyyy;
          vec4 y = y_ * ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);
          vec4 b0 = vec4(x.xy, y.xy);
          vec4 b1 = vec4(x.zw, y.zw);
          vec4 s0 = floor(b0)*2.0 + 1.0;
          vec4 s1 = floor(b1)*2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));
          vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
          vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
          vec3 p0 = vec3(a0.xy, h.x);
          vec3 p1 = vec3(a0.zw, h.y);
          vec3 p2 = vec3(a1.xy, h.z);
          vec3 p3 = vec3(a1.zw, h.w);
          vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
          p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
          vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
          m = m * m;
          return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        void main() {
          vec3 basePos = position;

          // Cheap curl-noise proxy: 3 offset snoise samples give a flow-field vector.
          // Sampling coord itself advances with time → the field scrolls, so particles
          // "drift like smoke" without needing per-frame position feedback.
          float ft = uTime * uFlowTime;
          vec3 flow;
          flow.x = snoise(basePos * 0.70 + vec3(ft, 0.0, 0.0));
          flow.y = snoise(basePos * 0.70 + vec3(0.0, ft * 1.13, 0.0));
          flow.z = snoise(basePos * 0.70 + vec3(0.0, 0.0, ft * 0.87));

          // Traveling wave through the field: a planar wave whose phase moves along uWaveDir.
          // Amplifies displacement and alpha where the wavefront is passing.
          float wavePhase = dot(basePos, uWaveDir) * uWaveFreq - uTime * uWaveSpeed;
          float wave = 0.5 + 0.5 * sin(wavePhase);

          vec3 displaced = basePos + flow * uAmp * (0.35 + 0.75 * wave);

          vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
          gl_Position = projectionMatrix * mvPosition;

          // Perspective size attenuation. mvPosition.z is negative in front of camera.
          gl_PointSize = uSizeBase * aSize * uPixelRatio * (170.0 / max(-mvPosition.z, 0.1));

          vColor = aColor;
          vAlpha = aAlpha * (0.42 + 0.58 * wave);
        }
      `;

      const FLUID_FS = /* glsl */`
        precision mediump float;
        varying vec3  vColor;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d2 = dot(uv, uv);
          // Sharp print-like disc: tight anti-alias window, no glow.
          float a = smoothstep(0.24, 0.19, d2);
          if (a <= 0.001) discard;
          gl_FragColor = vec4(vColor, a * vAlpha);
        }
      `;

      const fluidMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime:       { value: 0 },
          uPixelRatio: { value: pixelRatio },
          uWaveDir:    { value: waveDir },
          uWaveFreq:   { value: waveFreq },
          uWaveSpeed:  { value: waveSpeed },
          uAmp:        { value: flowAmp },
          uFlowTime:   { value: flowTimeScale },
          uSizeBase:   { value: 1.0 },
        },
        vertexShader: FLUID_VS,
        fragmentShader: FLUID_FS,
        transparent: true,
        depthWrite: false,        // don't hide ink lines behind fluid
        depthTest: true,
        blending: THREE.NormalBlending,  // NEVER additive on ivory ground
      });

      const fluid = new THREE.Points(fluidGeom, fluidMat);
      // Slight tilt so the fluid visibly crosses through the rosette plane
      // instead of sitting parallel to it — "sound flowing through the house."
      fluid.rotation.x = rand(-0.35, 0.35);
      fluid.rotation.z = rand(-0.20, 0.20);
      fluid.position.z = rand(-0.10, 0.20);
      assembly.add(fluid);

      // ---------- Ink layers (architecture) ----------
      const spinners = [];

      assembly.add(circleLine(2.85, INK, 0.14, -0.55));

      const outerStep = Math.max(3, Math.floor(primary / 2) - (rng() < .5 ? 1 : 2));
      const outer = starChords(primary, 2.6, outerStep, INK, 0.44, -0.45);
      assembly.add(outer);
      spinners.push({ obj: outer, spin: 0.0055 * (rng() < .5 ? 1 : -1) });

      const spokes = radials(primary * 2, 1.3, 2.6, INK, 0.11, -0.25, rng() * Math.PI * 2);
      assembly.add(spokes);
      spinners.push({ obj: spokes, spin: 0.003 });

      const midFold = pick(FOLDS);
      const stepA = Math.max(2, Math.floor(midFold / 2) - 1);
      const stepB = Math.max(3, Math.floor(midFold / 2));
      const band = girihBand(midFold, 1.72, 2.05, stepA, stepB, INK, 0.55, 0.0);
      assembly.add(band);
      spinners.push({ obj: band, spin: -0.011 });

      const innerStep = pick([3, 5, 7]);
      const inner = starChords(12, 1.35, innerStep, INK, 0.66, 0.42);
      assembly.add(inner);
      spinners.push({ obj: inner, spin: 0.019 });

      assembly.add(circleLine(1.35, INK, 0.30, 0.42));

      const central = starChords(8, 0.6, 3, INK, 0.82, 0.7);
      assembly.add(central);
      spinners.push({ obj: central, spin: -0.026 });

      assembly.add(circleLine(0.13, INK, 0.7, 0.85, 64));

      // ---------- Green line: one continuous stroke, breathing quietly ----------
      // Now the *secondary* green — the fluid carries the primary green ration.
      // Opacity oscillates between ~0.10 and ~0.42 on a long cycle so it rises and
      // recedes; total green budget stays disciplined.
      const COPRIME = [[8,3],[10,3],[10,7],[12,5],[12,7],[16,3],[16,5],[16,7]];
      const [gN, gStep] = pick(COPRIME);
      const greenTrace = starOneLine(gN, 2.15, gStep, GREEN, 0.28, 0.15);
      assembly.add(greenTrace);
      spinners.push({ obj: greenTrace, spin: 0.008 });

      // ---------- Ink drift dust (all ink now — fluid owns the green) ----------
      const PC = 260;
      const dPos  = new Float32Array(PC * 3);
      const dCol  = new Float32Array(PC * 3);
      const dMeta = new Float32Array(PC * 4);
      const inkColor = new THREE.Color(INK);
      for (let i = 0; i < PC; i++) {
        const r = rand(0.35, 3.15);
        const a = rng() * Math.PI * 2;
        const z0 = (rng() - 0.5) * 1.1;
        dPos[i*3]     = Math.cos(a) * r;
        dPos[i*3+1]   = Math.sin(a) * r;
        dPos[i*3+2]   = z0;
        dMeta[i*4]    = r;
        dMeta[i*4+1]  = a;
        dMeta[i*4+2]  = rand(0.35, 1.6);
        dMeta[i*4+3]  = z0;
        dCol[i*3] = inkColor.r; dCol[i*3+1] = inkColor.g; dCol[i*3+2] = inkColor.b;
      }
      const dGeom = new THREE.BufferGeometry();
      dGeom.setAttribute('position', new THREE.Float32BufferAttribute(dPos, 3));
      dGeom.setAttribute('color',    new THREE.Float32BufferAttribute(dCol, 3));
      const dust = new THREE.Points(dGeom, new THREE.PointsMaterial({
        size: 0.018, sizeAttenuation: true,
        vertexColors: true, transparent: true, opacity: 0.42,
        depthWrite: false,
      }));
      assembly.add(dust);

      // Sculptural tilt + random per-load starting angle
      const baseTiltX = 0.32;
      assembly.rotation.x = baseTiltX;
      assembly.rotation.z = rng() * Math.PI * 2;

      function resize() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h, false);
        const aspect = w / h;
        camera.aspect = aspect;
        camera.position.z = aspect >= 1.15 ? 8 : (aspect >= 0.85 ? 9.2 : (8 / Math.max(aspect, 0.42)));
        camera.updateProjectionMatrix();
        const isWide = aspect >= 1.4;
        const isMed  = aspect >= 0.95;
        assembly.position.x = isWide ? 1.6 : (isMed ? 0.7 : 0);
        assembly.scale.setScalar(isWide ? 1.0 : (isMed ? 0.9 : 0.82));
        fluidMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
      resize();
      window.addEventListener('resize', resize);

      const cursor = { x: 0, y: 0, tx: 0, ty: 0 };
      window.addEventListener('pointermove', (e) => {
        cursor.tx = (e.clientX / window.innerWidth  - 0.5) * 2;
        cursor.ty = (e.clientY / window.innerHeight - 0.5) * 2;
      }, { passive: true });

      const clock = new THREE.Clock();
      let ready = false;

      function tick() {
        const t = clock.getElapsedTime();
        const T = t * SPEED; // "slow time" — all animation drives off this

        // Ink layer spins (each layer scaled uniformly by SPEED)
        for (const l of spinners) l.obj.rotation.z += l.spin * SPEED;

        // Slow drift on the assembly
        const driftY = Math.sin(T * 0.075) * 0.26;
        const driftX = Math.sin(T * 0.11)  * 0.06;
        cursor.x += (cursor.tx - cursor.x) * 0.035 * SPEED;
        cursor.y += (cursor.ty - cursor.y) * 0.035 * SPEED;
        assembly.rotation.y = driftY + cursor.x * 0.22;
        assembly.rotation.x = baseTiltX + driftX - cursor.y * 0.12;

        // Fluid uniforms — a single time drives noise scroll + traveling wave
        fluidMat.uniforms.uTime.value = T;

        // Green line breathes very slowly between ~0.10 and ~0.42
        greenTrace.material.opacity = 0.10 + 0.32 * (0.5 + 0.5 * Math.sin(T * 0.055));

        // Ink dust orbit + gentle z-shimmer
        const pa = dust.geometry.attributes.position;
        for (let i = 0; i < PC; i++) {
          const r = dMeta[i*4];
          const baseA = dMeta[i*4+1];
          const freq = dMeta[i*4+2];
          const z0 = dMeta[i*4+3];
          const drift = Math.sin(T * 0.18 * freq + i * 0.13) * 0.05;
          const a = baseA + T * (i % 3 === 0 ? -0.014 : 0.019);
          pa.array[i*3]   = Math.cos(a) * (r + drift);
          pa.array[i*3+1] = Math.sin(a) * (r + drift);
          pa.array[i*3+2] = z0 + Math.sin(T * 0.42 + i * 0.71) * 0.07;
        }
        pa.needsUpdate = true;

        renderer.render(scene, camera);

        if (!ready) {
          ready = true;
          requestAnimationFrame(() => document.body.classList.add('webgl-ready'));
        }
        requestAnimationFrame(tick);
      }
      tick();
    }
  </script>
</body>
</html>
